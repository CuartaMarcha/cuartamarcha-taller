<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuarta Marcha - Taller Mecánico</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#CC1F1F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C. Marcha">
<link rel="apple-touch-icon" href="/logo.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#C8171A;--primary-dark:#A01012;--rojo:#C8171A;--verde:#C8171A;--verde-dark:#A01012;
  --azul:#555;--amber:#BA7517;
  --bg:#f2f2f2;--bg2:#ffffff;--border:#e0e0e0;
  --text:#111111;--text2:#777777;--radius:10px;
  --sidebar-bg:#1a1a1a;--sidebar-border:#2e2e2e;--sidebar-text:#e0e0e0;--sidebar-text2:#888;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;padding:0;transition:transform .25s;z-index:50}
.logo{padding:18px 16px;border-bottom:1px solid var(--sidebar-border)}
.logo-title{font-size:15px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:var(--sidebar-text2);margin-top:2px}
.nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--sidebar-text2);border:none;background:none;width:100%;text-align:left;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:#2a2a2a;color:#fff}
.nav-item.active{background:#2a0000;color:var(--primary);font-weight:600;border-left-color:var(--primary)}
.nav-item i{font-size:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;display:none}
.nav-badge.show{display:flex}
.nav-bottom{padding:12px 16px;border-top:1px solid var(--sidebar-border)}
.nav-bottom .btn{background:#2a2a2a;color:var(--sidebar-text2);border-color:var(--sidebar-border)}
.nav-bottom .btn:hover{background:#3a3a3a;color:#fff}

/* ── Main ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:12px}
.topbar-title{font-size:16px;font-weight:700}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--text)}
.hamburger i{font-size:22px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
.content{padding:20px;flex:1}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{background:#c0392b;color:#fff;border-color:#c0392b}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── Cards / Grids ── */
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:26px;font-weight:700}
.green{color:#1a7a3a}.red{color:var(--primary)}.blue{color:#1a5fa0}.amber{color:var(--amber)}

/* ── Forms ── */
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
input,select,textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:100;overflow-y:auto}
.modal{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:24px;width:600px;max-width:96vw;margin-bottom:60px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}

/* ── Tables ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{font-size:11px;color:var(--text2);text-align:left;padding:9px 8px;border-bottom:2px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#e6f4ec;color:#1a6b35}
.badge-amber{background:#fef3e2;color:#8a5500}
.badge-blue{background:#e8f0fb;color:#1a4fa0}
.badge-red{background:#fdecea;color:#b71c1c}
.badge-gray{background:#f0f0f0;color:#666}

/* ── Avatar ── */
.avatar{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#2a2a2a;color:#fff;flex-shrink:0}

/* ── Misc ── */
.search-wrap{position:relative}
.search-wrap input{padding-left:34px}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px}
.sep{border:none;border-top:1px solid var(--border);margin:16px 0}
.empty{text-align:center;padding:48px;color:var(--text2)}
.empty i{font-size:40px;margin-bottom:10px;display:block}
.priority-bar{display:flex;gap:8px;margin-bottom:20px}
.priority-col{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-width:0}
.priority-col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.orden-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.orden-card:hover{border-color:var(--primary)}
.orden-card-num{font-size:11px;color:var(--text2);margin-bottom:2px}
.orden-card-cliente{font-size:13px;font-weight:600}
.orden-card-trabajo{font-size:12px;color:var(--text2);margin-top:2px}
.seccion-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;max-width:96vw}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-title{font-size:22px;font-weight:800;color:var(--primary)}
.login-logo-sub{font-size:13px;color:var(--text2);margin-top:4px}
.login-error{background:#fdecea;color:#b71c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}

/* ── Fotos ── */
.fotos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:8px}
.foto-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.foto-thumb:hover{border-color:var(--primary)}

/* ── Mobile ── */
.card{overflow-x:auto}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .content{padding:14px}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .priority-bar{flex-direction:column}
  .modal{padding:16px}
  .modal-overlay{padding-top:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;margin-bottom:0;max-height:92vh;overflow-y:auto;width:100%;max-width:100%}
  .topbar{padding:10px 14px}
  .metric-value{font-size:20px}
  td,th{padding:7px 6px}
  .btn{padding:8px 12px}
  table{font-size:12px}
  .hide-mobile{display:none!important}
  .btn-sm{padding:6px 8px;font-size:11px}
}
/* Ensure table containers scroll horizontally */
.card > table, .card > div > table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div id="login-logo-wrap" style="font-size:40px;color:var(--verde)"><i class="ti ti-tool"></i></div>
      <div class="login-logo-title">Cuarta Marcha</div>
      <div class="login-logo-sub">Taller Mecánico — Sistema de gestión</div>

<div class="app" id="sistema" style="display:none">
<div class="sidebar">
  <div class="logo">
    <div style="display:flex;align-items:center;gap:10px">
      <img id="sidebar-logo-img" src="" alt="" style="height:40px;width:auto;display:none;border-radius:6px">
      <div>
        <div class="logo-title"><i class="ti ti-tool" id="sidebar-logo-icon"></i> Cuarta Marcha</div>

  </div>
  <div class="nav">
    <button class="nav-item active" onclick="ir('dashboard',this)"><i class="ti ti-layout-dashboard"></i> Inicio</button>

    <button class="nav-item" onclick="ir('ordenes',this)"><i class="ti ti-file-text"></i> Órdenes</button>
    <button class="nav-item" id="nav-turnos" onclick="ir('turnos',this)"><i class="ti ti-calendar"></i> Turnos<span class="nav-badge" id="badge-turnos"></span></button>

  </div>
</div>
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
    <span class="topbar-title" id="page-title">Inicio</span>
    <span style="font-size:12px;color:var(--text2)" id="fecha-top"></span>
  </div>
  <div class="content" id="content"></div>
</div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const SUPA_URL = 'https://ejhyvfjwudeponhgawiz.supabase.co';
const SUPA_KEY = 'sb_publishable_X_fOJC-3BhJ2ymGFB_6asQ_9T73J3GM';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);
// Poné la URL de tu logo acá (PNG o SVG). Si está vacío, no se muestra.
const LOGO_URL = 'logo.png';
// Link de Google Reviews de tu taller (reemplazalo con tu link real)
const GOOGLE_REVIEW_URL = 'https://g.page/r/CY-3GQ77HcXPEBM/review';

async function entrar(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display='none';
  const {error} = await supa.auth.signInWithPassword({email, password:pass});
  if(error){ err.style.display='block'; return; }
  mostrarSistema();
}

async function salir(){
  await supa.auth.signOut();
  document.getElementById('sistema').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
}

async function mostrarSistema(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('sistema').style.display='flex';
  document.getElementById('fecha-top').textContent = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  render();
}

supa.auth.getSession().then(({data:{session}})=>{ if(session) mostrarSistema(); });

// Mostrar logo si está configurado
if(LOGO_URL){
  const li = document.getElementById('sidebar-logo-img');
  if(li){ li.src=LOGO_URL; li.style.display='block'; document.getElementById('sidebar-logo-icon').style.display='none'; }
  const ll = document.getElementById('login-logo-wrap');
  if(ll) ll.innerHTML=`<img src="${LOGO_URL}" style="height:72px;width:auto;border-radius:10px">`;
}

const titles = {dashboard:'Inicio',clientes:'Clientes',vehiculos:'Vehículos',ordenes:'Órdenes de trabajo',prioridades:'Cola de prioridades',turnos:'Turnos',seguimientos:'Seguimientos',presupuestos:'Presupuestos',precios:'Lista de precios',historial:'Historial de clientes',cuentas:'Cuentas corrientes',caja:'Caja',cierre:'Cierre mensual'};
let page = 'dashboard';

function ir(p, el){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('page-title').textContent = titles[p];
  page = p; render(); cerrarSidebar();
  if(p==='turnos') limpiarBadgeTurnos();
}

async function actualizarBadgeTurnos(){
  const hoyStr = new Date().toISOString().slice(0,10);
  const {data} = await supa.from('turnos').select('id',{count:'exact'})
    .eq('estado','pendiente').gte('fecha', hoyStr);
  const badge = document.getElementById('badge-turnos');
  if(!badge) return;
  const n = data?.length || 0;
  if(n > 0){ badge.textContent = n > 99 ? '99+' : n; badge.classList.add('show'); }
  else { badge.classList.remove('show'); }
}

function limpiarBadgeTurnos(){
  const badge = document.getElementById('badge-turnos');
  if(badge){ badge.classList.remove('show'); }
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function cerrarSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function abrirModal(html){ document.getElementById('modal-inner').innerHTML=html; document.getElementById('modal-overlay').style.display='flex'; }
function cerrarModal(){ document.getElementById('modal-overlay').style.display='none'; }
function cerrarModalOverlay(e){ if(e.target===document.getElementById('modal-overlay')) cerrarModal(); }
function fmt(n){ return '$'+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0}); }
function fmtFecha(d){ if(!d)return''; const[y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function hoy(){ return new Date().toISOString().slice(0,10); }
function mesActual(){ return hoy().slice(0,7); }
function iniciales(n){ return (n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function badgeEstado(e){
  const m={recibido:'badge-amber',en_diagnostico:'badge-amber',en_proceso:'badge-blue',listo:'badge-green',entregado:'badge-gray',cancelado:'badge-red'};
  const l={recibido:'Recibido',en_diagnostico:'En diagnóstico',en_proceso:'En proceso',listo:'Listo',entregado:'Entregado',cancelado:'Cancelado'};
  return `<span class="badge ${m[e]||'badge-gray'}">${l[e]||e}</span>`;
}
function badgePrioridad(p){
  const m={urgente:'badge-red',normal:'badge-blue',puede_esperar:'badge-gray'};
  const l={urgente:'🔴 Urgente',normal:'🔵 Normal',puede_esperar:'⚪ Puede esperar'};
  return `<span class="badge ${m[p]||'badge-gray'}">${l[p]||p}</span>`;
}

// Número en letras
function numeroALetras(n){
  const u=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
  const d=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const c=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n===0)return'cero';
  if(n<0)return'menos '+numeroALetras(-n);
  if(n<20)return u[n];
  if(n<100)return d[Math.floor(n/10)]+(n%10?' y '+u[n%10]:'');
  if(n<1000)return(n===100?'cien':c[Math.floor(n/100)]+(n%100?' '+numeroALetras(n%100):''));
  if(n<1000000){
    const m=Math.floor(n/1000);
    return(m===1?'mil':numeroALetras(m)+' mil')+(n%1000?' '+numeroALetras(n%1000):'');
  }
  return n.toString();
}

async function render(){
  const c = document.getElementById('content');
  c.innerHTML = '<div class="empty"><i class="ti ti-loader"></i></div>';
  if(page==='dashboard') await renderDashboard();
  if(page==='clientes') await renderClientes();
  if(page==='vehiculos') await renderVehiculos();
  if(page==='ordenes') await renderOrdenes();
  if(page==='prioridades') await renderPrioridades();
  if(page==='turnos') await renderTurnos();
  if(page==='seguimientos') await renderSeguimientos();
  if(page==='presupuestos') await renderPresupuestos();
  if(page==='precios') await renderPrecios();
  if(page==='historial') await renderHistorial();
  if(page==='cuentas') await renderCuentas();
  if(page==='caja') await renderCaja();
  if(page==='cierre') await renderCierre();
}

async function renderDashboard(){
  const hace4 = new Date(); hace4.setDate(hace4.getDate()-4);
  const hace8 = new Date(); hace8.setDate(hace8.getDate()-8);
  const hace5 = new Date(); hace5.setDate(hace5.getDate()-5);
  const [clientes, ordenes, turnos, caja, vehiculos, ultimasOrdenes, seguimientos, movsCuenta] = await Promise.all([
    supa.from('clientes').select('id'),
    supa.from('ordenes').select('*'),
    supa.from('turnos').select('*').eq('fecha', hoy()),
    supa.from('caja').select('*'),
    supa.from('vehiculos').select('id,patente,marca,modelo,cliente_id,clientes(nombre,apellido,telefono)').order('patente'),
    supa.from('ordenes').select('vehiculo_id,fecha_ingreso').order('fecha_ingreso',{ascending:false}),
    supa.from('ordenes').select('id,numero,cliente_nombre,vehiculo_patente,vehiculo_modelo,fecha_ingreso,estado,cliente_id,clientes(telefono)')
      .gte('fecha_ingreso', hace8.toISOString().slice(0,10))
      .lte('fecha_ingreso', hace4.toISOString().slice(0,10))
      .neq('estado','cancelado'),
    supa.from('cuenta_corriente').select('*,clientes(nombre,apellido,telefono)')
  ]);
  const mes = caja.data?.filter(c=>c.fecha?.slice(0,7)===mesActual());
  const ing = mes?.filter(c=>c.tipo==='ingreso').reduce((a,b)=>a+Number(b.monto),0)||0;
  const egr = mes?.filter(c=>c.tipo==='egreso').reduce((a,b)=>a+Number(b.monto),0)||0;
  const abiertas = ordenes.data?.filter(o=>o.estado!=='entregado'&&o.estado!=='cancelado').length||0;
  const turnosHoy = turnos.data||[];
  const ordenesRecientes = (ordenes.data||[]).slice(-5).reverse();
  // Seguimientos post-servicio
  const seguimientosList = seguimientos.data||[];
  // Deudores con más de 5 días sin pagar
  const movs = movsCuenta.data||[];
  const saldosPorCliente = {};

async function renderClientes(){
  const [{data}, {data:vehs}] = await Promise.all([
    supa.from('clientes').select('*').order('nombre'),
    supa.from('vehiculos').select('cliente_id,id,patente,marca,modelo')
  ]);
  window._clientes = data||[];
  window._vehsPorCliente = {};
  (vehs||[]).forEach(v=>{
    if(!window._vehsPorCliente[v.cliente_id]) window._vehsPorCliente[v.cliente_id]=[];
    window._vehsPorCliente[v.cliente_id].push(v);
  });
  document.getElementById('content').innerHTML = `
  <div style="display:flex;gap:12px;margin-bottom:20px">
    <div class="search-wrap" style="flex:1"><i class="ti ti-search si"></i><input type="text" placeholder="Buscar cliente..." id="buscar-cliente" oninput="filtrarClientes()"></div>
    <button class="btn btn-primary" onclick="modalCliente()"><i class="ti ti-plus"></i> Nuevo cliente</button>
  </div>
  <div class="card" style="padding:0" id="tabla-clientes">${renderTablaClientes(data||[])}</div>`;
}

function renderTablaClientes(data){
  if(!data.length) return '<div class="empty"><i class="ti ti-users"></i><p>No hay clientes registrados</p></div>';
  return `<div class="table-wrap"><table><thead><tr><th></th><th>Nombre</th><th class="hide-mobile">DNI</th><th>Teléfono</th><th class="hide-mobile">Email</th><th>Vehículos</th><th></th></tr></thead><tbody>
  ${data.map(c=>{
    const vehs = window._vehsPorCliente?.[c.id]||[];
    const vehsHtml = vehs.length
      ? vehs.map(v=>`<div style="font-size:11px;white-space:nowrap"><i class="ti ti-car" style="font-size:11px"></i> <strong>${v.patente}</strong> ${v.marca} ${v.modelo}</div>`).join('')
      : '<span style="color:var(--text2);font-size:12px">Sin vehículos</span>';
    return `<tr>
    <td><div class="avatar">${iniciales(c.nombre+' '+c.apellido)}</div></td>
    <td><div style="font-weight:500">${c.nombre} ${c.apellido}</div></td>
    <td class="hide-mobile">${c.dni||'-'}</td><td>${c.telefono||'-'}</td><td class="hide-mobile">${c.email||'-'}</td>
    <td>${vehsHtml}</td>
    <td style="white-space:nowrap">
      <div style="display:flex;gap:4px;flex-wrap:nowrap">
        <button class="btn btn-sm" onclick="fichaCliente('${c.id}')"><i class="ti ti-eye"></i> Ver ficha</button>
        <button class="btn btn-sm" onclick="modalCliente('${c.id}')"><i class="ti ti-edit"></i></button>
        <button class="btn btn-sm btn-danger" onclick="eliminarCliente('${c.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </td></tr>`;}).join('')}
  </tbody></table></div>`;
}

function filtrarClientes(){
  const q = document.getElementById('buscar-cliente').value.toLowerCase();
  const filtrado = (window._clientes||[]).filter(c=>(c.nombre+' '+c.apellido+c.dni+c.telefono).toLowerCase().includes(q));
  document.getElementById('tabla-clientes').innerHTML = renderTablaClientes(filtrado);
}

async function fichaCliente(cliId, mesFiltro){
  const c = (window._clientes||[]).find(x=>x.id===cliId)||{};
  const [{data:vehs},{data:ords},{data:pres},{data:movs}] = await Promise.all([
    supa.from('vehiculos').select('*').eq('cliente_id',cliId),
    supa.from('ordenes').select('*').eq('cliente_id',cliId).order('fecha_ingreso',{ascending:false}),
    supa.from('presupuestos').select('*').eq('cliente_id',cliId).order('fecha',{ascending:false}),
    supa.from('cuenta_corriente').select('*').eq('cliente_id',cliId).order('fecha',{ascending:false})
  ]);
  window._fichaRaw = {cliId, vehs:vehs||[], ords:ords||[], pres:pres||[], movs:movs||[]};
  const saldo = (movs||[]).reduce((a,m)=>m.tipo==='debito'?a+Number(m.monto):a-Number(m.monto),0);
  const ultimaVisita = ords?.length ? fmtFecha(ords[0].fecha_ingreso) : '-';
  const mesActual = hoy().slice(0,7);
  const mes = mesFiltro || mesActual;

  // Armar lista de meses disponibles (todos los que aparecen en cualquier sección)
  const todosMeses = [...new Set([
    ...(ords||[]).map(o=>(o.fecha_ingreso||'').slice(0,7)),
    ...(pres||[]).map(p=>(p.fecha||'').slice(0,7)),
    ...(movs||[]).map(m=>(m.fecha||'').slice(0,7))
  ].filter(Boolean))].sort().reverse();

  const nombreMesFicha = m => {
    if(!m) return '';
    const [y,mo] = m.split('-');
    const ns = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return `${ns[parseInt(mo)-1]} ${y}`;
  };

  document.getElementById('content').innerHTML = `
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar" style="width:48px;height:48px;font-size:16px">${iniciales(c.nombre+' '+c.apellido)}</div>
        <div>
          <div style="font-size:18px;font-weight:700">${c.nombre} ${c.apellido}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">${c.telefono||'-'} &nbsp;·&nbsp; ${c.email||'-'}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="renderClientes()"><i class="ti ti-arrow-left"></i> Volver</button>
        <button class="btn btn-primary" onclick="modalCliente('${cliId}')"><i class="ti ti-edit"></i> Editar</button>
      </div>
    </div>
  </div>
  <div class="grid4" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">Total órdenes</div><div class="metric-value blue">${ords?.length||0}</div></div>
    <div class="metric"><div class="metric-label">Saldo cuenta</div><div class="metric-value ${saldo>0?'red':saldo<0?'green':''}">${saldo>0?'Debe':'A favor'} ${fmt(Math.abs(saldo))}</div></div>
    <div class="metric"><div class="metric-label">Última visita</div><div class="metric-value" style="font-size:18px">${ultimaVisita}</div></div>
    <div class="metric"><div class="metric-label">Vehículos</div><div class="metric-value amber">${vehs?.length||0}</div></div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="seccion-title"><i class="ti ti-car"></i> Vehículos</div>
      <button class="btn btn-primary btn-sm" onclick="modalVehiculoParaCliente('${cliId}')"><i class="ti ti-plus"></i> Agregar vehículo</button>
    </div>
    ${vehs?.length?`<div class="table-wrap"><table><thead><tr><th>Patente</th><th>Marca</th><th>Modelo</th><th>Año</th><th></th></tr></thead><tbody>
    ${vehs.map(v=>`<tr><td><strong>${v.patente}</strong></td><td>${v.marca||'-'}</td><td>${v.modelo||'-'}</td><td>${v.anio||'-'}</td>
    <td><button class="btn btn-sm" onclick="modalVehiculo('${v.id}')"><i class="ti ti-edit"></i></button></td></tr>`).join('')}
    </tbody></table></div>`:'<p style="font-size:13px;color:var(--text2)">Sin vehículos registrados</p>'}
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <i class="ti ti-calendar" style="color:var(--text2)"></i>
    <span style="font-size:13px;color:var(--text2);font-weight:500">Filtrar por mes:</span>
    <select onchange="renderFichaMes('${cliId}',this.value)" style="min-width:160px">
      <option value="">Todos los meses</option>
      ${todosMeses.map(m=>`<option value="${m}" ${m===mes&&mesFiltro?'selected':''}>${nombreMesFicha(m)}</option>`).join('')}
    </select>
  </div>
  <div id="ficha-secciones">${renderFichaSecciones(cliId, ords||[], pres||[], movs||[], mesFiltro||'')}</div>`;
}

function renderFichaSecciones(cliId, ords, pres, movs, mes){
  const f = x => !mes || (x||'').slice(0,7)===mes;
  const ordsFilt = ords.filter(o=>f(o.fecha_ingreso));
  const presFilt = pres.filter(p=>f(p.fecha));
  const movsFilt = movs.filter(m=>f(m.fecha));

  return `
  <div class="card" style="margin-bottom:16px">
    <div class="seccion-title" style="margin-bottom:12px"><i class="ti ti-file-text"></i> Órdenes de trabajo${mes?' — '+nombreMesFichaFmt(mes):''}</div>
    ${ordsFilt.length?`<div class="table-wrap"><table><thead><tr><th>#</th><th>Fecha</th><th>Vehículo</th><th>Estado</th><th>Total</th></tr></thead><tbody>
    ${ordsFilt.map(o=>`<tr>
      <td><strong>#${o.numero}</strong></td><td>${fmtFecha(o.fecha_ingreso)}</td>
      <td>${o.vehiculo_patente||''} ${o.vehiculo_marca||''} ${o.vehiculo_modelo||''}</td>
      <td>${badgeEstado(o.estado)}</td><td><strong>${fmt(o.total)}</strong></td>
    </tr>`).join('')}</tbody></table></div>`:'<p style="font-size:13px;color:var(--text2)">Sin órdenes'+(mes?' en este mes':'')+`</p>`}
  </div>
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="seccion-title"><i class="ti ti-credit-card"></i> Movimientos de cuenta${mes?' — '+nombreMesFichaFmt(mes):''}</div>
      <button class="btn btn-primary btn-sm" onclick="modalMovimiento('${cliId}')"><i class="ti ti-plus"></i> Nuevo</button>
    </div>
    ${movsFilt.length?`<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Monto</th></tr></thead><tbody>
    ${movsFilt.map(m=>`<tr>
      <td>${fmtFecha(m.fecha)}</td><td>${m.concepto||'-'}</td>
      <td>${m.tipo==='debito'?'<span class="badge badge-red">Débito</span>':'<span class="badge badge-green">Crédito</span>'}</td>
      <td class="${m.tipo==='debito'?'red':'green'}">${fmt(m.monto)}</td>
    </tr>`).join('')}</tbody></table></div>`:'<p style="font-size:13px;color:var(--text2)">Sin movimientos'+(mes?' en este mes':'')+`</p>`}
  </div>
  <div class="card">
    <div class="seccion-title" style="margin-bottom:12px"><i class="ti ti-calculator"></i> Presupuestos${mes?' — '+nombreMesFichaFmt(mes):''}</div>
    ${presFilt.length?`<div class="table-wrap"><table><thead><tr><th>#</th><th>Fecha</th><th>Estado</th><th>Total</th><th></th></tr></thead><tbody>
    ${presFilt.map(p=>{const eb=p.estado==='aprobado'?'badge-green':p.estado==='rechazado'?'badge-red':'badge-amber';
    return `<tr><td><strong>#${p.numero}</strong></td><td>${fmtFecha(p.fecha)}</td>
      <td><span class="badge ${eb}">${p.estado}</span></td><td><strong>${fmt(p.total)}</strong></td>
      <td><button class="btn btn-sm" onclick="verPresupuesto('${p.id}')"><i class="ti ti-eye"></i> Ver</button></td>
    </tr>`;}).join('')}</tbody></table></div>`:'<p style="font-size:13px;color:var(--text2)">Sin presupuestos'+(mes?' en este mes':'')+`</p>`}
  </div>`;
}

function nombreMesFichaFmt(m){
  if(!m) return '';
  const [y,mo] = m.split('-');
  const ns=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${ns[parseInt(mo)-1]} ${y}`;
}

function renderFichaMes(cliId, mes){
  const d = window._fichaRaw||{};
  document.getElementById('ficha-secciones').innerHTML = renderFichaSecciones(cliId, d.ords||[], d.pres||[], d.movs||[], mes);

async function guardarCliente(id){
  const data={nombre:document.getElementById('f-nombre').value.trim(),apellido:document.getElementById('f-apellido').value.trim(),dni:document.getElementById('f-dni').value.trim()||'',telefono:document.getElementById('f-tel').value.trim(),email:document.getElementById('f-email').value.trim(),direccion:document.getElementById('f-dir').value.trim()};
  if(!data.nombre||!data.telefono){alert('Completá nombre y teléfono');return;}
  if(id){
    await supa.from('clientes').update(data).eq('id',id);
  } else {
    const {data:nuevo} = await supa.from('clientes').insert(data).select().single();
    // Guardar vehículo si se completó
    if(nuevo){
      const marca=document.getElementById('f-v-marca')?.value.trim();
      const modelo=document.getElementById('f-v-modelo')?.value.trim();
      const patente=document.getElementById('f-v-patente')?.value.trim().toUpperCase();
      const anio=document.getElementById('f-v-anio')?.value.trim();
      const color=document.getElementById('f-v-color')?.value.trim();
      if(marca&&modelo&&patente){
        await supa.from('vehiculos').insert({cliente_id:nuevo.id,marca,modelo,patente,anio:anio||null,color:color||null});
      }
    }
  }
  cerrarModal(); await renderClientes();
}

function filtrarOrdenes(filtro, btn){
  document.querySelectorAll('.filtro-orden').forEach(b=>b.style.background=b.style.color='');
  btn.style.background='var(--primary)'; btn.style.color='#fff';
  window._filtroOrdenEstado = filtro;
  aplicarFiltrosOrdenes();
}

function aplicarFiltrosOrdenes(){
  const todos = window._ordenes||[];
  const filtro = window._filtroOrdenEstado||'todas';
  const mapa = {urgentes:'urgente',proceso:'en_proceso',listas:'listo',entregadas:'entregado'};
  const q = (document.getElementById('ord-buscar')?.value||'').toLowerCase().trim();
  let lista = filtro==='todas' ? todos : todos.filter(o=>o.estado===mapa[filtro]);
  if(q) lista = lista.filter(o=>
    (o.cliente_nombre||'').toLowerCase().includes(q)
    ||String(o.numero).includes(q)
    ||(o.vehiculo_patente||'').toLowerCase().includes(q)
    ||(o.vehiculo_marca||'').toLowerCase().includes(q)
    ||(o.vehiculo_modelo||'').toLowerCase().includes(q)
    ||(o.mecanico||'').toLowerCase().includes(q)
    ||(o.fecha_ingreso||'').includes(q)
  );
  document.getElementById('tabla-ordenes').innerHTML = renderTablaOrdenes(lista);
}

function toggleDetallesOrden(){
  const d = document.getElementById('detalles-extra');
  const ico = document.getElementById('ico-detalles');
  const lbl = document.getElementById('lbl-detalles');
  const abierto = d.style.display !== 'none';
  d.style.display = abierto ? 'none' : 'block';
  ico.className = abierto ? 'ti ti-chevron-down' : 'ti ti-chevron-up';
  lbl.textContent = abierto ? 'Ver más detalles' : 'Ocultar detalles';
  // Asegurar valores por defecto si están ocultos
  if(!document.getElementById('f-fing')?.value)
    document.getElementById('f-fing') && (document.getElementById('f-fing').value = hoy());
}

function toggleNuevoClienteOrden(){
  const f = document.getElementById('nuevo-cli-form');
  if(f) f.style.display = f.style.display==='none' ? 'block' : 'none';
}

async function guardarNuevoClienteOrden(){
  const nombre = document.getElementById('nc-nombre').value.trim();
  const apellido = document.getElementById('nc-apellido').value.trim();
  const tel = document.getElementById('nc-tel').value.trim();
  if(!nombre||!tel){alert('Nombre y teléfono son obligatorios');return;}
  const {data:nuevo, error} = await supa.from('clientes').insert({nombre, apellido, telefono:tel, dni:''}).select().single();
  if(error){alert('Error al guardar cliente: '+error.message);return;}
  // Agregar al selector y seleccionarlo
  const sel = document.getElementById('f-cli');
  const opt = document.createElement('option');
  opt.value = nuevo.id;
  opt.textContent = `${nuevo.nombre} ${nuevo.apellido||''}`.trim();
  opt.selected = true;
  sel.appendChild(opt);
  // Actualizar cache de clientes para vehículos
  if(!window._vehsOrden) window._vehsOrden = [];
  filtrarVehsOrden(nuevo.id);
  toggleNuevoClienteOrden();
}

function filtrarVehsOrden(cliId, selId){
  const cli = cliId||document.getElementById('f-cli')?.value;
  const filtrados = (window._vehsOrden||[]).filter(v=>v.cliente_id===cli);
  const sel = document.getElementById('f-veh');
  if(!sel)return;
  sel.innerHTML = filtrados.length
    ? filtrados.map((v,i)=>`<option value="${v.id}" ${(selId?v.id===selId:i===0)?'selected':''}>${v.patente} - ${v.marca} ${v.modelo}</option>`).join('')
    : '<option value="">Sin vehículos para este cliente</option>';
}

function autocompletarServicio(){
  const sel = document.getElementById('f-srv-lista');
  const opt = sel.options[sel.selectedIndex];
  if(!opt.value) return;
  document.getElementById('f-srv-desc').value = opt.text;
  document.getElementById('f-srv-precio').value = opt.dataset.cont||0;
}

function agregarServicioOrden(){
  const desc = document.getElementById('f-srv-desc').value.trim();
  const precio = Number(document.getElementById('f-srv-precio').value)||0;
  const cant = Number(document.getElementById('f-srv-cant').value)||1;
  if(!desc){alert('Ingresá la descripción del servicio');return;}
  window._ordenServicios.push({descripcion:desc, precio_unitario:precio, cantidad:cant});
  document.getElementById('f-srv-desc').value='';
  document.getElementById('f-srv-precio').value='';
  document.getElementById('f-srv-cant').value='1';
  document.getElementById('f-srv-lista').value='';
  renderServiciosOrden();
}

function renderServiciosOrden(){
  const lista = document.getElementById('lista-servicios-orden');
  if(!lista) return;
  const srvs = window._ordenServicios||[];
  lista.innerHTML = srvs.length
    ? `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">${srvs.map((s,i)=>`
        <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px">${s.descripcion}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">${s.cantidad} u. × ${fmt(s.precio_unitario)}</div>
          </div>
          <div style="font-weight:700;font-size:15px;color:var(--primary);white-space:nowrap">${fmt(s.precio_unitario*s.cantidad)}</div>
          <button class="btn btn-sm btn-danger" style="flex-shrink:0;padding:6px 8px" onclick="window._ordenServicios.splice(${i},1);renderServiciosOrden()"><i class="ti ti-trash"></i></button>
        </div>`).join('')}</div>`
    : '<p style="font-size:13px;color:var(--text2);padding:4px 0 10px">Sin servicios agregados</p>';
  actualizarTotalOrden();
}

function agregarRepuestoOrden(){
  const nombre = document.getElementById('f-rep-nombre').value.trim();
  const cantidad = Number(document.getElementById('f-rep-cant').value)||1;
  const precio = Number(document.getElementById('f-rep-precio').value)||0;
  const estado = document.getElementById('f-rep-estado').value;
  if(!nombre){alert('Ingresá el nombre del repuesto');return;}
  window._ordenRepuestos.push({nombre,cantidad,precio_unitario:precio,estado});
  document.getElementById('f-rep-nombre').value='';
  document.getElementById('f-rep-cant').value='1';
  document.getElementById('f-rep-precio').value='';
  renderRepuestosOrden();
}

function renderRepuestosOrden(){
  const lista = document.getElementById('lista-repuestos-orden');
  if(!lista)return;
  const reps = window._ordenRepuestos||[];
  const badgeRep = e => ({
    esperando_ok:'<span class="badge badge-amber">Esperando OK</span>',
    cliente_trae:'<span class="badge badge-gray">Lo trae cliente</span>',
    pedido:'<span class="badge badge-blue">Pedido</span>',
    disponible:'<span class="badge badge-green">Disponible</span>',
    pendiente_pago:'<span class="badge badge-red">Pend. pago</span>',
    pagado:'<span class="badge badge-green">Pagado</span>',
  })[e]||'<span class="badge badge-gray">-</span>';
  lista.innerHTML = reps.length
    ? `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">${reps.map((r,i)=>`
        <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.nombre}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">${r.cantidad} u. × ${fmt(r.precio_unitario)} ${badgeRep(r.estado)}</div>
          </div>
          <div style="font-weight:700;font-size:15px;color:var(--primary);white-space:nowrap">${fmt(r.precio_unitario*r.cantidad)}</div>
          <button class="btn btn-sm btn-danger" style="flex-shrink:0;padding:6px 8px" onclick="window._ordenRepuestos.splice(${i},1);renderRepuestosOrden()"><i class="ti ti-trash"></i></button>
        </div>`).join('')}</div>`
    : '<p style="font-size:13px;color:var(--text2);padding:4px 0 10px">Sin repuestos agregados</p>';
  const total = reps.reduce((a,r)=>a+r.precio_unitario*r.cantidad,0);
  const t = document.getElementById('total-repuestos-ord');
  if(t) t.textContent = fmt(total);
  actualizarTotalOrden();
}

function actualizarTotalOrden(){
  const srvs = window._ordenServicios||[];
  const reps = window._ordenRepuestos||[];
  const totalSrvs = srvs.reduce((a,s)=>a+s.precio_unitario*s.cantidad,0);
  const totalReps = reps.reduce((a,r)=>a+r.precio_unitario*r.cantidad,0);
  const gran = totalSrvs+totalReps;
  const elSrv = document.getElementById('total-servicios-ord');
  const elRep = document.getElementById('total-repuestos-ord');
  const elGran = document.getElementById('gran-total-ord');
  const elHidden = document.getElementById('f-total');
  if(elSrv) elSrv.textContent = fmt(totalSrvs);
  if(elRep) elRep.textContent = fmt(totalReps);
  if(elGran) elGran.textContent = fmt(gran);
  if(elHidden) elHidden.value = gran;
}

async function guardarOrden(id){
  const cliId = document.getElementById('f-cli').value;
  const vehId = document.getElementById('f-veh').value;
  if(!cliId||!vehId){alert('Seleccioná cliente y vehículo');return;}
  const {data:cls} = await supa.from('clientes').select('nombre,apellido').eq('id',cliId).single();
  const {data:veh} = await supa.from('vehiculos').select('patente,marca,modelo').eq('id',vehId).single();
  const reps = window._ordenRepuestos||[];
  const srvs = window._ordenServicios||[];
  const totalReps = reps.reduce((a,r)=>a+r.precio_unitario*r.cantidad,0);
  const totalSrvs = srvs.reduce((a,s)=>a+s.precio_unitario*s.cantidad,0);
  const manoObra = totalSrvs;
  const totalGeneral = totalSrvs + totalReps;
  // Armar texto de servicios para trabajos_realizados
  const srvTexto = srvs.length ? srvs.map(s=>`- ${s.descripcion} x${s.cantidad}: ${fmt(s.precio_unitario*s.cantidad)}`).join('\n') : '';
  const data={
    cliente_id:cliId,vehiculo_id:vehId,
    cliente_nombre:`${cls?.nombre} ${cls?.apellido}`,
    vehiculo_patente:veh?.patente,vehiculo_marca:veh?.marca,vehiculo_modelo:veh?.modelo,
    prioridad:document.getElementById('f-pri')?.value||'normal',
    estado:document.getElementById('f-est').value,
    mecanico:document.getElementById('f-mec').value,
    kilometraje_ingreso:document.getElementById('f-km')?.value||'',
    descripcion_cliente:document.getElementById('f-desc').value,
    trabajos_realizados:[srvTexto, document.getElementById('f-trab').value].filter(Boolean).join('\n'),
    diagnostico_mecanico:document.getElementById('f-diag')?.value||'',
    observaciones:document.getElementById('f-obs')?.value||'',
    fecha_ingreso:document.getElementById('f-fing')?.value||hoy(),
    fecha_entrega:document.getElementById('f-fent')?.value||null,
    tiempo_real_horas:Number(document.getElementById('f-tiempo')?.value)||null,
    cliente_autorizo:document.getElementById('f-autorizo')?.checked||false,
    total:totalGeneral
  };
  let ordenId = id;
  if(id){
    const {error:updErr} = await supa.from('ordenes').update(data).eq('id',id);
    if(updErr){alert('Error al actualizar orden: '+updErr.message);return;}
  } else {
    const {data:nueva, error:insErr} = await supa.from('ordenes').insert(data).select().single();
    if(insErr){alert('Error al guardar orden: '+insErr.message);return;}
    ordenId = nueva?.id;
  }
  if(ordenId){
    await supa.from('orden_repuestos').delete().eq('orden_id',ordenId);
    if(reps.length) await supa.from('orden_repuestos').insert(
      reps.map(r=>({orden_id:ordenId,nombre:r.nombre,cantidad:r.cantidad,precio_unitario:r.precio_unitario,subtotal:r.precio_unitario*r.cantidad,estado:r.estado}))
    );
  }
  // Subir fotos nuevas
  if(ordenId){
    const input = document.getElementById('f-fotos');
    if(input?.files?.length){
      for(const file of Array.from(input.files)){
        const ext = file.name.split('.').pop();
        const path = `${ordenId}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
        const {error:upErr} = await supa.storage.from('orden-fotos').upload(path, file, {upsert:true});
        if(!upErr){
          const {data:urlData} = supa.storage.from('orden-fotos').getPublicUrl(path);
          await supa.from('orden_fotos').insert({orden_id:ordenId, url:urlData.publicUrl, nombre:file.name});
        }
      }
    }
  }
  // Sincronizar deuda total (mano de obra + repuestos pendientes) en cuenta corriente
  if(ordenId && cliId){
    const repsPendientes = reps.filter(r=>r.estado==='pendiente_pago');
    const totalRepsPendientes = repsPendientes.reduce((a,r)=>a+r.precio_unitario*r.cantidad,0);
    const totalDeuda = manoObra + totalRepsPendientes;
    const marker = `[ORD:${ordenId}]`;
    await supa.from('cuenta_corriente').delete().ilike('concepto',`%${marker}%`).eq('cliente_id',cliId);
    if(totalDeuda>0){
      const {data:ord} = await supa.from('ordenes').select('numero').eq('id',ordenId).single();
      const partes = [];
      if(manoObra>0) partes.push(`mano de obra ${fmt(manoObra)}`);
      if(totalRepsPendientes>0) partes.push(`repuestos ${fmt(totalRepsPendientes)}`);
      await supa.from('cuenta_corriente').insert({
        cliente_id:cliId,
        tipo:'debito',
        monto:totalDeuda,
        concepto:`${marker} Orden #${ord?.numero||''} — ${partes.join(' + ')}`,
        fecha:hoy(),
        saldo:0
      });
    }
  }
  // Egreso automático en caja por repuestos pedidos al proveedor
  if(ordenId){
    const repsPedidos = reps.filter(r=>r.estado==='pedido');
    const totalPedido = repsPedidos.reduce((a,r)=>a+r.precio_unitario*r.cantidad,0);
    const markerRep = `[REP:${ordenId}]`;
    await supa.from('caja').delete().ilike('concepto',`%${markerRep}%`);
    if(totalPedido>0){
      const {data:ord} = await supa.from('ordenes').select('numero').eq('id',ordenId).single();
      await supa.from('caja').insert({
        tipo:'egreso',
        monto:totalPedido,
        concepto:`${markerRep} Repuestos pedidos — Orden #${ord?.numero||''}`,
        categoria:'Repuestos',
        fecha:hoy()
      });
    }
  }
  const estadoFinal = data.estado;
  cerrarModal();
  await renderOrdenes();
  // Si se entrega la orden, preguntar si abona
  if(estadoFinal==='entregado' && cliId){
    const {data:ord} = await supa.from('ordenes').select('numero').eq('id',ordenId).single();
    const {data:cliData} = await supa.from('clientes').select('nombre,apellido,telefono').eq('id',cliId).single();
    const cliNombre = `${cliData?.nombre||cls?.nombre||''} ${cliData?.apellido||cls?.apellido||''}`.trim();
    const tel = (cliData?.telefono||'').replace(/\D/g,'');
    const numOrden = ord?.numero||'';
    const vehInfo = [data?.vehiculo_patente, data?.vehiculo_marca, data?.vehiculo_modelo].filter(Boolean).join(' ');
    const msgWA = `Hola ${cliData?.nombre||cliNombre.split(' ')[0]}! 👋 Te avisamos desde *Cuarta Marcha Taller Mecánico* que tu vehículo${vehInfo?' ('+vehInfo+')':''} ya está listo para retirar 🔧✅\n\nOrden #${numOrden}${totalGeneral>0?' — Total: '+fmt(totalGeneral):''}\n\nAnte cualquier consulta no dudes en comunicarte.\nTel: 351-344-3965`;
    const waUrl = tel ? `https://wa.me/54${tel.replace(/^0/,'')}?text=${encodeURIComponent(msgWA)}` : '';
    window._pagoOrden = {ordenId, cliId, cliNombre, total: totalGeneral};
    abrirModal(`
      <div class="modal-title"><span><i class="ti ti-circle-check" style="color:#1a7a3a"></i> Orden entregada</span><button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div>
      <p style="margin-bottom:6px">Orden <strong>#${numOrden}</strong> · Cliente: <strong>${cliNombre}</strong></p>
      <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Total de la orden: <strong style="font-size:16px;color:var(--text)">${fmt(totalGeneral)}</strong></p>

      ${waUrl ? `<a href="${waUrl}" target="_blank" class="btn" style="width:100%;background:#25D366;color:#fff;justify-content:center;padding:13px;margin-bottom:16px;font-weight:600">
        <i class="ti ti-brand-whatsapp" style="font-size:20px"></i> Avisar al cliente por WhatsApp
      </a>` : `<div style="background:var(--bg2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:16px">⚠️ El cliente no tiene teléfono cargado</div>`}

      ${totalGeneral>0 ? `<p style="font-weight:600;margin-bottom:12px">¿El cliente abona ahora?</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-primary" style="justify-content:flex-start;padding:14px 16px" onclick="const p=window._pagoOrden;modalConfirmarPago(p.ordenId,p.cliId,p.cliNombre,p.total,p.total,'completo')">
          <i class="ti ti-circle-check" style="font-size:20px"></i>
          <div style="text-align:left"><div style="font-weight:600">Sí, abona completo</div><div style="font-size:12px;opacity:.8">${fmt(totalGeneral)} — cancela la cuenta</div></div>

async function registrarPagoOrden(ordenId, cliId, cliNombre, totalOrden, montoPago, tipo, formaPago){
  const {data:ord} = await supa.from('ordenes').select('numero').eq('id',ordenId).single();
  const num = ord?.numero||'';
  if(tipo==='completo'){
    await supa.from('cuenta_corriente').delete().ilike('concepto',`%[ORD:${ordenId}]%`).eq('cliente_id',cliId);
    const {data:ordData} = await supa.from('ordenes').select('observaciones').eq('id',ordenId).single();
    const presMatch = (ordData?.observaciones||'').match(/presupuesto #(\d+)/i);
    if(presMatch){
      const {data:pres} = await supa.from('presupuestos').select('id').eq('numero',presMatch[1]).maybeSingle();
      if(pres) await supa.from('cuenta_corriente').delete().ilike('concepto',`%[PRES:${pres.id}]%`).eq('cliente_id',cliId);
    }
  }
  await supa.from('cuenta_corriente').insert({
    cliente_id:cliId, tipo:'credito', monto:montoPago,
    concepto:`[ORD:${ordenId}] Pago orden #${num}${tipo==='completo'?' — pago total':' — pago parcial'}`,
    fecha:hoy(), saldo:0
  });
  const {error:cajaErr} = await supa.from('caja').insert({
    tipo:'ingreso', monto:montoPago,
    concepto:`Cobro orden #${num} — ${cliNombre}`,
    categoria:'Servicio', forma_pago:formaPago||'efectivo', fecha:hoy()
  });
  cerrarModal();
  if(cajaErr){
    console.error('Error caja:', cajaErr);
    alert(`✓ Cobro registrado en cuenta corriente.\n\n⚠️ No se guardó en caja.\nError: ${cajaErr.message||JSON.stringify(cajaErr)}`);
  } else {
    alert(`✓ Cobro de ${fmt(montoPago)} registrado en cuenta corriente y caja.`);
    if(document.querySelector('.tab-btn.active')?.dataset?.tab==='caja') await renderCaja();
  }
}

}

function autocompletarRecordatorio(){
  const val = document.getElementById('f-rec-preset')?.value;
  if(!val) return;
  const [desc, meses] = val.split('|');
  document.getElementById('f-rec-desc').value = desc;
  document.getElementById('f-rec-meses').value = meses;
  calcularFechaRecordatorio();
}

function calcularFechaRecordatorio(){
  const meses = Number(document.getElementById('f-rec-meses')?.value)||0;
  if(!meses) return;
  const fecha = new Date();
  fecha.setMonth(fecha.getMonth() + meses);
  document.getElementById('f-rec-fecha').value = fecha.toISOString().slice(0,10);
}

async function guardarRecordatorioOrden(ordenId){
  const desc = document.getElementById('f-rec-desc')?.value.trim();
  const fecha = document.getElementById('f-rec-fecha')?.value;
  if(!desc||!fecha){alert('Completá el servicio y la fecha');return;}
  const o = (window._ordenes||[]).find(x=>x.id===ordenId)||{};
  let telefono = '';
  if(o.cliente_id){
    const {data:cli} = await supa.from('clientes').select('telefono').eq('id',o.cliente_id).single();
    telefono = cli?.telefono||'';
  }
  const {error} = await supa.from('recordatorios').insert({
    orden_id:ordenId, cliente_id:o.cliente_id||null,
    cliente_nombre:o.cliente_nombre||'', vehiculo_desc:[o.vehiculo_patente,o.vehiculo_marca,o.vehiculo_modelo].filter(Boolean).join(' '),
    telefono, tipo_servicio:desc, fecha_recordatorio:fecha, estado:'pendiente'
  });
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('f-rec-desc').value='';
  document.getElementById('f-rec-meses').value='';
  document.getElementById('f-rec-fecha').value='';
  document.getElementById('f-rec-preset').value='';
  cargarRecordatoriosOrden(ordenId);
}

async function guardarTurno(id){
  const cliSel = document.getElementById('f-cli-t');
  const cliId = cliSel.value||null;
  const cliNombreRegistrado = cliSel.options[cliSel.selectedIndex]?.dataset?.nombre||'';
  const cliNombreLibre = document.getElementById('f-nombre-libre-t')?.value?.trim()||'';
  const cliNombre = cliId ? cliNombreRegistrado : cliNombreLibre;

  const vehId = document.getElementById('f-veh-t').value||null;
  const veh = vehId?(window._vehsTurno||[]).find(v=>v.id===vehId):null;
  const vehLibre = document.getElementById('f-veh-libre-t')?.value?.trim()||'';

  const data={
    cliente_id:cliId,
    cliente_nombre:cliNombre,
    vehiculo_id:vehId,
    vehiculo_patente:veh?.patente||(!vehId?vehLibre:null)||null,
    vehiculo_marca:veh?.marca||null,
    vehiculo_modelo:veh?.modelo||null,
    fecha:document.getElementById('f-fecha-t').value,
    hora:document.getElementById('f-hora-t').value,
    tipo_trabajo:document.getElementById('f-tipo-t').value.trim(),
    duracion_estimada:Number(document.getElementById('f-dur-t').value)||60,
    mecanico:document.getElementById('f-mec-t').value,
    estado:document.getElementById('f-est-t').value,
    telefono_contacto:document.getElementById('f-tel-t')?.value?.trim()||null,
    observaciones:document.getElementById('f-obs-t').value
  };
  if(!data.fecha||!data.hora||!data.tipo_trabajo){alert('Completá fecha, hora y tipo de trabajo');return;}
  if(id){
    const {error:e} = await supa.from('turnos').update(data).eq('id',id);
    if(e){alert('Error al actualizar turno: '+e.message);return;}
  } else {
    const {error:e} = await supa.from('turnos').insert(data);
    if(e){alert('Error al guardar turno: '+e.message);return;}
  }
  cerrarModal(); await renderTurnos();
}

async function guardarRecepcionTurno(turnoId, cliId, vehId){
  const cliNombre = document.getElementById('rct-cli').value.trim();
  const vehDesc = document.getElementById('rct-veh').value.trim();
  const desc = document.getElementById('rct-desc').value.trim();
  const km = document.getElementById('rct-km').value||'';
  const estado = document.getElementById('rct-estado').value;
  const mecanico = document.getElementById('rct-mec').value;
  if(!cliNombre){alert('Ingresá el nombre del cliente');return;}

  const t = (window._turnos||[]).find(x=>x.id===turnoId)||{};

  // Si no hay cliente registrado, buscar por teléfono antes de crear
  if(!cliId){
    const telBuscar = (t.telefono_contacto||'').replace(/\D/g,'');
    if(telBuscar){
      const {data:cliExist} = await supa.from('clientes').select('id').ilike('telefono','%'+telBuscar.slice(-8)+'%').maybeSingle();
      if(cliExist) cliId = cliExist.id;
    }
    if(!cliId){
      const nombreParts = cliNombre.split(' ');
      const {data:nuevoCli} = await supa.from('clientes').insert({
        nombre: nombreParts[0]||cliNombre,
        apellido: nombreParts.slice(1).join(' ')||'',
        telefono: t.telefono_contacto||''
      }).select().single();
      if(nuevoCli) cliId = nuevoCli.id;
    }
  }

  // Si no hay vehículo registrado, buscar por patente antes de crear
  let vehPatente='', vehMarca='', vehModelo='';
  if(vehId){
    const {data:veh} = await supa.from('vehiculos').select('patente,marca,modelo').eq('id',vehId).single();
    if(veh){vehPatente=veh.patente||'';vehMarca=veh.marca||'';vehModelo=veh.modelo||'';}
  } else {
    const autoStr = vehDesc || t.vehiculo_modelo || '';
    const parts = autoStr.trim().split(' ');
    vehMarca = parts[0]||'';
    vehModelo = parts.slice(1).join(' ')||'';
    vehPatente = t.vehiculo_patente||'';
    if(cliId && (vehMarca||vehPatente)){
      // Verificar si ya existe ese vehículo para ese cliente
      let vehExistQ = supa.from('vehiculos').select('id').eq('cliente_id',cliId);
      if(vehPatente) vehExistQ = vehExistQ.ilike('patente',vehPatente);
      const {data:vehExist} = await vehExistQ.maybeSingle();
      if(vehExist){ vehId = vehExist.id; }
      else {
      const {data:nuevoVeh} = await supa.from('vehiculos').insert({
        cliente_id: cliId,
        marca: vehMarca,
        modelo: vehModelo,
        patente: vehPatente,
        color: t.vehiculo_color||null
      }).select().single();
      if(nuevoVeh) vehId = nuevoVeh.id;
      }
    }
  }

  const {error:ordErr} = await supa.from('ordenes').insert({
    cliente_id:cliId||null, cliente_nombre:cliNombre,
    vehiculo_id:vehId||null, vehiculo_patente:vehPatente, vehiculo_marca:vehMarca, vehiculo_modelo:vehModelo,
    descripcion_cliente:desc, kilometraje_ingreso:km,
    estado, mecanico, fecha_ingreso:hoy(), prioridad:'normal', total:0
  });
  if(ordErr){alert('Error al crear orden: '+ordErr.message);return;}
  await supa.from('turnos').update({estado:'en_proceso'}).eq('id',turnoId);
  cerrarModal();
  await renderTurnos();
  alert('Orden de trabajo creada.');
}

async function aplicarComisionATodos(){
  const porc = Number(document.getElementById('porc-mp').value)||0;
  if(!porc){alert('Ingresá un porcentaje primero');return;}
  if(!confirm(`¿Aplicar ${porc}% de recargo a TODOS los precios de tarjeta?`))return;
  const {data} = await supa.from('precios').select('id,precio_contado');
  for(const p of data||[]){
    const tarjeta = Math.round(p.precio_contado*(1+porc/100));
    await supa.from('precios').update({precio_tarjeta:tarjeta}).eq('id',p.id);
  }
  await renderPrecios();
}

function filtrarPresupuestos(q){

  if(!opt.value)return;
  const tipo = document.getElementById('fp-tipo').value;
  const precio = tipo==='tarjeta'?Number(opt.dataset.tarj):Number(opt.dataset.cont);
  window._presup_items.push({desc:opt.text,precio,cantidad:1});
  renderItemsPres();
}

function renderItemsPres(){
  const lista = document.getElementById('fp-items-lista');
  if(!lista)return;
  lista.innerHTML = window._presup_items.map((it,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;font-size:13px">${it.desc}</div>
      <input type="number" value="${it.cantidad}" min="1" style="width:60px" onchange="window._presup_items[${i}].cantidad=Number(this.value);renderItemsPres()">
      <div style="min-width:90px;text-align:right">${fmt(it.precio*it.cantidad)}</div>
      <button class="btn btn-sm btn-danger" onclick="window._presup_items.splice(${i},1);renderItemsPres()"><i class="ti ti-trash"></i></button>
    </div>`).join('');
  const total = window._presup_items.reduce((a,b)=>a+b.precio*b.cantidad,0);
  const t = document.getElementById('fp-total');
  if(t) t.textContent = fmt(total);
}

async function guardarPresupuesto(){
  const cliSel = document.getElementById('fp-cli');
  const cliId = cliSel.value||null;
  const nombreLibre = document.getElementById('fp-nombre-libre')?.value?.trim();
  const cliNombre = cliId
    ? (cliSel.options[cliSel.selectedIndex]?.dataset?.nombre||'')
    : (nombreLibre||'Consumidor Final');
  if(!window._presup_items.length){alert('Agregá al menos un ítem al presupuesto');return;}
  const total = window._presup_items.reduce((a,b)=>a+b.precio*b.cantidad,0);
  const {data:pres,error} = await supa.from('presupuestos').insert({
    cliente_id:cliId,cliente_nombre:cliNombre,
    vehiculo_id:document.getElementById('fp-veh').value||null,
    tipo_precio:document.getElementById('fp-tipo').value,
    observaciones:document.getElementById('fp-obs').value,
    total,estado:'pendiente',fecha:hoy()
  }).select().single();
  if(error){alert('Error al guardar: '+error.message);return;}
  if(pres&&window._presup_items.length){
    const {error:err2} = await supa.from('presupuesto_items').insert(
      window._presup_items.map(it=>({presupuesto_id:pres.id,descripcion:it.desc,cantidad:it.cantidad,precio_unitario:it.precio,subtotal:it.precio*it.cantidad}))
    );
    if(err2){alert('Error al guardar ítems: '+err2.message);return;}
  }
  cerrarModal(); await renderPresupuestos();
}

async function eliminarPresupuesto(id){
  if(!confirm('¿Eliminar?'))return;
  await supa.from('presupuestos').delete().eq('id',id);
  await renderPresupuestos();
}

async function _buildPresupuestoPDF(id){
  const [{data:p},{data:items}] = await Promise.all([

    supa.from('presupuesto_items').select('*').eq('presupuesto_id',id)
  ]);

  const jsPDF = window.jspdf?.jsPDF || window.jsPDF;

  const w = doc.internal.pageSize.getWidth();
  const h = doc.internal.pageSize.getHeight();
  const mid = w/2;

  doc.setDrawColor(224,224,224); doc.setLineWidth(0.3);
  doc.rect(10,10,w-20,h-20,'S');

  let logoW = 0;
  if(LOGO_URL){
    try{
      const img=new Image(); img.src=LOGO_URL;
      await new Promise(r=>{img.onload=r;img.onerror=r;});
      doc.addImage(img,'PNG',14,13,28,28); logoW=34;
    }catch(e){}
  }

  doc.setTextColor(200,23,26); doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('PRESUPUESTO', w-14, 24, {align:'right'});
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
  doc.text(`N° ${p.numero}`, w-14, 32, {align:'right'});
  doc.text(`Fecha: ${fmtFecha(p.fecha)}`, w-14, 39, {align:'right'});
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  doc.text('CUARTA MARCHA', 14+logoW, 22);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
  doc.text('Taller Mecánico', 14+logoW, 28);
  doc.text('San Isidro 1256, Córdoba Capital', 14+logoW, 34);
  doc.text('Tel: 351-344-3965', 14+logoW, 39);

  doc.setDrawColor(200,23,26); doc.setLineWidth(1);
  doc.line(10,46,w-10,46);

  const boxY=49, boxH=32;
  doc.setFillColor(244,244,244); doc.rect(10,boxY,w-20,boxH,'F');
  doc.setDrawColor(224,224,224); doc.setLineWidth(0.3);
  doc.rect(10,boxY,w-20,boxH,'S');
  doc.line(mid,boxY,mid,boxY+boxH);
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(200,23,26);
  doc.text('TALLER', 14,boxY+7);
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  doc.text('Cuarta Marcha Taller Mecánico', 14,boxY+14);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
  doc.text('San Isidro 1256, Córdoba Capital', 14,boxY+20);
  doc.text('Tel: 351-344-3965', 14,boxY+25);
  doc.text('cuartamarchataller@gmail.com', 14,boxY+30);
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(200,23,26);
  doc.text('CLIENTE', mid+4,boxY+7);
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  doc.text(p.cliente_nombre||'Consumidor Final', mid+4,boxY+14);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
  if(cliente?.telefono) doc.text(`Tel: ${cliente.telefono}`, mid+4,boxY+20);
  if(cliente?.email) doc.text(`Email: ${cliente.email}`, mid+4,boxY+25);
  if(cliente?.dni) doc.text(`DNI: ${cliente.dni}`, mid+4,boxY+30);

  const fY=boxY+boxH+2;
  doc.setFillColor(26,26,26); doc.rect(10,fY,w-20,8,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(`Fecha: ${fmtFecha(p.fecha)}`, 14,fY+5.5);
  doc.text('Validez: 15 días', w-14,fY+5.5,{align:'right'});
  doc.text(p.tipo_precio==='tarjeta'?'Precio: Tarjeta':'Precio: Contado', mid,fY+5.5,{align:'center'});

  let y=fY+12;
  doc.setFillColor(26,26,26); doc.rect(10,y,w-20,8,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('DESCRIPCIÓN', 14,y+5.5);
  doc.text('UNIDADES', 122,y+5.5,{align:'center'});
  doc.text('P. UNIT.', 153,y+5.5,{align:'center'});
  doc.text('TOTAL', w-14,y+5.5,{align:'right'});
  y+=10;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  (items||[]).forEach((it,i)=>{
    if(i%2===0){ doc.setFillColor(248,248,248); doc.rect(10,y-4,w-20,9,'F'); }
    doc.setDrawColor(224,224,224); doc.setLineWidth(0.2);
    doc.line(10,y+5,w-10,y+5);
    doc.setTextColor(26,26,26);
    doc.text(String(it.descripcion||'').slice(0,55), 14,y+1);
    doc.text(String(it.cantidad), 122,y+1,{align:'center'});
    doc.text(fmt(it.precio_unitario), 153,y+1,{align:'center'});
    doc.text(fmt(it.subtotal), w-14,y+1,{align:'right'});
    y+=9;
  });

  y+=4;
  const totW=85, totX=w-10-totW;
  doc.setDrawColor(224,224,224); doc.setLineWidth(0.3);

  doc.setTextColor(100,100,100); doc.setFontSize(9); doc.setFont('helvetica','normal');

  y+=8;
  doc.setFillColor(200,23,26); doc.rect(totX,y,totW,10,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('TOTAL', totX+4,y+7);
  doc.text(fmt(p.total), w-14,y+7,{align:'right'});
  y+=14;
  doc.setFontSize(8); doc.setFont('helvetica','italic'); doc.setTextColor(100,100,100);
  doc.text(`Son: ${numeroALetras(Math.floor(Number(p.total)))} pesos`, 14,y);
  y+=10;
  if(p.observaciones){ doc.setFont('helvetica','normal'); doc.text(`Obs: ${p.observaciones}`, 14,y); y+=8; }

  const firmY=Math.max(y+10,230);
  doc.setDrawColor(224,224,224); doc.setLineWidth(0.3);
  doc.rect(10,firmY,w-20,30,'S');
  doc.line(mid,firmY,mid,firmY+30);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(120,120,120);
  doc.text('Firma del taller', mid/2+10, firmY+5, {align:'center'});
  doc.text('Firma del cliente', mid+(w-mid)/2, firmY+5, {align:'center'});
  doc.setDrawColor(26,26,26); doc.setLineWidth(0.4);
  doc.line(30,firmY+22,mid-10,firmY+22);
  doc.line(mid+10,firmY+22,w-30,firmY+22);

  doc.setFillColor(26,26,26); doc.rect(10,h-16,w-20,7,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('Cuarta Marcha Taller Mecánico  |  San Isidro 1256, Córdoba Capital  |  351-344-3965', mid,h-11.5,{align:'center'});

  return {doc, p};
}

async function generarPresupuestoPDF(id){
  try{
    const {doc, p} = await _buildPresupuestoPDF(id);
    doc.save(`Presupuesto-N${p.numero}-${(p.cliente_nombre||'CF').replace(/ /g,'-')}-${p.fecha}.pdf`);
  }catch(e){alert('Error al generar PDF: '+e.message);console.error(e);}
}

async function enviarPresupuestoWP(id){
  const btn = event?.currentTarget;
  try{
    if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Subiendo PDF...';}
    const {doc, p} = await _buildPresupuestoPDF(id);
    // Subir PDF a Supabase Storage y obtener link público
    let pdfUrl = '';
    try{
      const blob = doc.output('blob');
      const fileName = `presupuesto-${p.numero}-${Date.now()}.pdf`;
      const {error:upErr} = await supa.storage.from('presupuestos').upload(fileName, blob, {contentType:'application/pdf', upsert:true});
      if(!upErr){
        const {data:urlData} = supa.storage.from('presupuestos').getPublicUrl(fileName);
        pdfUrl = urlData?.publicUrl||'';
      }
    }catch(e){ console.warn('No se pudo subir el PDF:', e); }
    // Obtener teléfono del cliente
    let tel = '';
    if(p.cliente_id){
      const {data:cl} = await supa.from('clientes').select('telefono').eq('id',p.cliente_id).single();
      tel = (cl?.telefono||'').replace(/\D/g,'');
    }
    const msg = pdfUrl
      ? `Hola ${p.cliente_nombre||''}! Te enviamos el presupuesto N°${p.numero} de *Cuarta Marcha Taller Mecánico*.\n\nTotal: *${fmt(p.total)}*\nValidez: 15 días\n\n📄 Ver presupuesto completo:\n${pdfUrl}\n\nCualquier consulta llamanos al 351-344-3965.`
      : `Hola ${p.cliente_nombre||''}! Te enviamos el presupuesto N°${p.numero} de *Cuarta Marcha Taller Mecánico*.\n\nTotal: *${fmt(p.total)}*\nValidez: 15 días\n\nCualquier consulta llamanos al 351-344-3965.`;
    const waUrl = `https://wa.me/${tel?'54'+tel:''}?text=${encodeURIComponent(msg)}`;
    // También descargar localmente
    doc.save(`Presupuesto-N${p.numero}.pdf`);
    setTimeout(()=>window.open(waUrl,'_blank'), 600);
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-brand-whatsapp"></i> WhatsApp';}
  }catch(e){
    alert('Error: '+e.message);console.error(e);
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-brand-whatsapp"></i> WhatsApp';}
  }
}

async function aprobarPresupuesto(id){
  const {data:pCheck} = await supa.from('presupuestos').select('estado').eq('id',id).single();
  if(pCheck?.estado==='aprobado'){alert('Este presupuesto ya fue aprobado.');return;}
  await supa.from('presupuestos').update({estado:'aprobado'}).eq('id',id);
  const {data:p} = await supa.from('presupuestos').select('*').eq('id',id).single();
  // Generar cargo en cuenta corriente si tiene cliente
  if(p?.cliente_id && p?.total>0){
    const marker = `[PRES:${id}]`;
    await supa.from('cuenta_corriente').delete().ilike('concepto',`%${marker}%`).eq('cliente_id',p.cliente_id);
    await supa.from('cuenta_corriente').insert({
      cliente_id:p.cliente_id,
      tipo:'debito',
      monto:p.total,
      concepto:`${marker} Presupuesto N°${p.numero} aprobado`,
      fecha:hoy(),
      saldo:0
    });
  }
  cerrarModal();
  // Preguntar si crear orden y/o turno
  abrirModal(`
    <div class="modal-title"><span><i class="ti ti-check" style="color:var(--primary)"></i> Presupuesto aprobado</span><button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:8px">Se generó un cargo de <strong>${fmt(p?.total||0)}</strong> en la cuenta corriente de ${p?.cliente_nombre||'el cliente'}.</p>
    <p style="color:var(--text2);font-size:13px;margin-bottom:20px">¿Qué querés hacer a continuación?</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-primary" style="justify-content:flex-start;padding:14px 16px" onclick="crearOrdenDesdePresupuesto('${id}',false)">

      </button>
