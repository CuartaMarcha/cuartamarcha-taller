async function guardarMovimiento(){
  const data={cliente_id:document.getElementById('fm-cli').value,tipo:document.getElementById('fm-tipo').value,monto:Number(document.getElementById('fm-monto').value)||0,concepto:document.getElementById('fm-concepto').value.trim(),fecha:document.getElementById('fm-fecha').value,saldo:0};
  if(!data.cliente_id||!data.monto||!data.concepto){alert('Completá todos los campos');return;}
  const {error} = await supa.from('cuenta_corriente').insert(data);
  if(error){alert('Error al guardar: '+error.message);return;}
  // Registrar también en caja: crédito = el cliente paga (ingreso), débito = sale dinero (egreso)
  const tipoCaja = data.tipo==='credito' ? 'ingreso' : 'egreso';
  const {data:cli} = await supa.from('clientes').select('nombre,apellido').eq('id',data.cliente_id).single();
  const cliLabel = cli ? `${cli.nombre} ${cli.apellido}` : '';
  await supa.from('caja').insert({
    tipo: tipoCaja,
    monto: data.monto,
    concepto: data.concepto + (cliLabel ? ` — ${cliLabel}` : ''),
    fecha: data.fecha,
    forma_pago: 'efectivo',
    cliente_id: data.cliente_id
  });
  cerrarModal(); await renderCuentas();
}

async function renderCaja(desde, hasta){
  const {data:todosMovs} = await supa.from('caja').select('*').order('fecha',{ascending:false}).order('created_at',{ascending:false}).limit(500);
  const hoyData = todosMovs?.filter(c=>c.fecha===hoy())||[];
  const ingHoy = hoyData.filter(c=>c.tipo==='ingreso').reduce((a,b)=>a+Number(b.monto),0);
  const egrHoy = hoyData.filter(c=>c.tipo==='egreso').reduce((a,b)=>a+Number(b.monto),0);
  // Defaults: primer día del mes actual → hoy
  const primerDiaMes = hoy().slice(0,7)+'-01';
  const desdeActivo = desde ?? primerDiaMes;
  const hastaActivo = hasta ?? hoy();
  const enRango = f => f >= desdeActivo && f <= hastaActivo;
  const data = (todosMovs||[]).filter(c=>enRango(c.fecha));
  const ingRango = data.filter(c=>c.tipo==='ingreso').reduce((a,b)=>a+Number(b.monto),0);
  const egrRango = data.filter(c=>c.tipo==='egreso').reduce((a,b)=>a+Number(b.monto),0);
  const {data:todosCD} = await supa.from('cierres_caja').select('*').eq('tipo','diario').order('fecha',{ascending:false}).limit(200);
  const cierresDiarios = (todosCD||[]).filter(c=>enRango(c.fecha));

  document.getElementById('content').innerHTML = `
  <div class="grid3" style="margin-bottom:20px">
    <div class="metric"><div class="metric-label">Ingresos de hoy</div><div class="metric-value green">${fmt(ingHoy)}</div></div>
    <div class="metric"><div class="metric-label">Egresos de hoy</div><div class="metric-value red">${fmt(egrHoy)}</div></div>
    <div class="metric"><div class="metric-label">Balance de hoy</div><div class="metric-value ${ingHoy-egrHoy>=0?'green':'red'}">${fmt(ingHoy-egrHoy)}</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="modalCaja('ingreso')"><i class="ti ti-arrow-down"></i> Ingreso</button>
      <button class="btn btn-danger" onclick="modalCaja('egreso')"><i class="ti ti-arrow-up"></i> Egreso</button>
    </div>
    <button class="btn" style="background:#111;color:#fff;font-weight:600" onclick="modalArqueoCaja()"><i class="ti ti-lock"></i> Cerrar caja</button>
  </div>
  <div class="card" style="padding:12px 16px;margin-bottom:16px">
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
      <div>
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px"><i class="ti ti-calendar"></i> Desde</label>
        <input type="date" id="caja-desde" value="${desdeActivo}" style="padding:7px 10px">
      </div>
      <div>
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px"><i class="ti ti-calendar"></i> Hasta</label>
        <input type="date" id="caja-hasta" value="${hastaActivo}" style="padding:7px 10px">
      </div>
      <button class="btn btn-primary" onclick="renderCaja(document.getElementById('caja-desde').value, document.getElementById('caja-hasta').value)"><i class="ti ti-search"></i> Buscar</button>
      <button class="btn btn-sm" onclick="renderCaja(null,null)"><i class="ti ti-refresh"></i> Este mes</button>
      <button class="btn btn-sm" onclick="(()=>{const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);const ini=d.toISOString().slice(0,7)+'-01';const fin=new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10);renderCaja(ini,fin)})()"><i class="ti ti-chevron-left"></i> Mes anterior</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:20px;font-size:13px">
      <span>Ingresos del período: <strong class="green">${fmt(ingRango)}</strong></span>
      <span>Egresos del período: <strong class="red">${fmt(egrRango)}</strong></span>
      <span>Balance: <strong class="${ingRango-egrRango>=0?'green':'red'}">${fmt(ingRango-egrRango)}</strong></span>
    </div>
  </div>
  <div class="card" style="padding:0;margin-bottom:24px">
  ${data?.length?`<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Categoría</th><th>Forma de pago</th><th>Monto</th><th></th></tr></thead><tbody>
  ${data.map(c=>`<tr><td>${fmtFecha(c.fecha)}</td><td>${c.tipo==='ingreso'?'<span class="badge badge-green">Ingreso</span>':'<span class="badge badge-red">Egreso</span>'}</td><td>${c.concepto}</td><td>${c.categoria||'-'}</td><td>${c.forma_pago||'-'}</td><td class="${c.tipo==='ingreso'?'green':'red'}"><strong>${fmt(c.monto)}</strong></td>
    <td><button class="btn btn-sm btn-danger" onclick="eliminarCaja('${c.id}')"><i class="ti ti-trash"></i></button></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty"><i class="ti ti-cash"></i><p>Sin movimientos en el período</p></div>'}
  </div>
  <div class="seccion-title">Cierres diarios del período</div>
  <div class="card" style="padding:0">
  ${cierresDiarios?.length ? `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Ingresos</th><th>Egresos</th><th>Balance</th><th>Ef. sistema</th><th>Ef. físico</th><th>Diferencia</th><th>Notas</th></tr></thead><tbody>
  ${cierresDiarios.map(c=>{
    const dif=Number(c.diferencia)||0;
    return `<tr>
      <td>${fmtFecha(c.fecha)}</td>
      <td class="green">${fmt(c.total_ingresos)}</td>
      <td class="red">${fmt(c.total_egresos)}</td>
      <td style="font-weight:600">${fmt(c.balance_sistema)}</td>
      <td>${fmt(c.efectivo_sistema)}</td>
      <td>${fmt(c.efectivo_fisico)}</td>
      <td style="font-weight:700;color:${dif===0?'var(--green)':dif>0?'var(--green)':'var(--red)'}">${dif===0?'✓ Cuadrada':dif>0?'+'+fmt(dif):fmt(dif)}</td>
      <td style="font-size:12px;color:var(--text2)">${c.notas||'-'}</td>
    </tr>`;
  }).join('')}</tbody></table></div>` : '<div class="empty"><i class="ti ti-lock"></i><p>Sin cierres en el período</p></div>'}
  </div>`;
}

function htmlBuscadorCliente(id, nombrePre, valorPre, placeholder){
  return `<div style="position:relative">
    <input id="${id}-texto" value="${nombrePre||''}" placeholder="${placeholder||'Escribí nombre o apellido...'}" autocomplete="off"
      oninput="buscarClienteGenerico('${id}',this.value)"
      style="width:100%;box-sizing:border-box">
    <input type="hidden" id="${id}" value="${valorPre||''}">
    <div id="${id}-lista" style="display:none;position:absolute;z-index:999;background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:100%;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.3)"></div>
  </div>`;
}

function buscarClienteGenerico(id, texto){
  const lista = document.getElementById(id+'-lista');
  const hidden = document.getElementById(id);
  if(!lista||!hidden) return;
  hidden.value='';
  if(!texto.trim()){ lista.style.display='none'; return; }
  const q = texto.toLowerCase();
  const matches = (window._clientesGlobal||[]).filter(c=>
    (c.nombre+' '+c.apellido+' '+c.apellido+' '+c.nombre).toLowerCase().includes(q)
  ).slice(0,8);
  if(!matches.length){ lista.style.display='none'; return; }
  lista.style.display='block';
  lista.innerHTML = matches.map(c=>`
    <div onclick="seleccionarClienteGenerico('${id}','${c.id}','${(c.apellido+', '+c.nombre).replace(/'/g,'')}')"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px"
      onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      ${c.apellido}, ${c.nombre}
    </div>`).join('');
}

function seleccionarClienteGenerico(id, valor, nombre){
  const texto = document.getElementById(id+'-texto');
  const hidden = document.getElementById(id);
  const lista = document.getElementById(id+'-lista');
  if(texto) texto.value=nombre;
  if(hidden) hidden.value=valor;
  if(lista) lista.style.display='none';
  // Disparar callbacks según el id
  if(id==='f-cli') filtrarVehsOrden(valor);
  if(id==='f-cli-t') { toggleClienteLibre(); filtrarVehsTurno(); }
  if(id==='fp-cli') { filtrarVehsPres(); toggleClientePres(); }
  if(id==='f-cliente-id') {} // sin callback
  if(id==='fm-cli') {} // sin callback
  if(id==='fc-cli') filtrarOrdenesCaja(valor);
}

async function modalCaja(tipo){
  const {data:cls} = await supa.from('clientes').select('id,nombre,apellido').order('apellido');
  const {data:ords} = await supa.from('ordenes').select('id,numero,cliente_nombre,vehiculo_patente,estado').order('numero',{ascending:false}).limit(100);
  window._cajaTipo = tipo;
  window._cajaClis = cls||[];
  window._clientesGlobal = cls||[];
  window._cajaOrdenes = ords||[];
  abrirModal(`
    <div class="modal-title"><span>${tipo==='ingreso'?'Registrar ingreso':'Registrar egreso'}</span><button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div>
    <div><label>Concepto *</label><input id="fc-concepto" placeholder="${tipo==='ingreso'?'Ej: Cobro orden #12':'Ej: Compra de insumos'}"></div>
    <div class="grid2">
      <div><label>Monto *</label><input type="number" id="fc-monto" placeholder="0"></div>
      <div><label>Forma de pago</label><select id="fc-pago">
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia</option>
        <option value="tarjeta_debito">Tarjeta débito</option>
        <option value="tarjeta_credito">Tarjeta crédito</option>
        <option value="cheque">Cheque</option>
      </select></div>
    </div>
    <div class="grid2">
      <div><label>Categoría</label><input id="fc-cat" placeholder="${tipo==='ingreso'?'Ej: Servicio':'Ej: Insumos'}"></div>
      <div><label>Fecha</label><input type="date" id="fc-fecha" value="${hoy()}"></div>
    </div>
    <div style="border-top:1px solid var(--border);margin:16px 0;padding-top:16px">
      <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Asociar a cliente / orden (opcional)</div>
      <div style="margin-bottom:10px">
        <label>Cliente</label>
        ${htmlBuscadorCliente('fc-cli', '', '', 'Escribí apellido o nombre...')}
      </div>
      <div id="fc-orden-wrap" style="display:none;margin-bottom:10px">
        <label>Orden de trabajo</label>
        <select id="fc-orden">
          <option value="">— Sin asociar a orden —</option>
        </select>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn ${tipo==='ingreso'?'btn-primary':'btn-danger'}" onclick="guardarCaja('${tipo}')">Guardar</button>
    </div>`);
}


function filtrarOrdenesCaja(cliId){
  if(!cliId) cliId = document.getElementById('fc-cli').value;
  const wrap = document.getElementById('fc-orden-wrap');
  const sel = document.getElementById('fc-orden');
  if(!cliId){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  supa.from('ordenes').select('id,numero,vehiculo_patente,estado').eq('cliente_id',cliId).order('numero',{ascending:false}).limit(50).then(({data})=>{
    sel.innerHTML = '<option value="">— Sin asociar a orden —</option>' +
      (data||[]).map(o=>`<option value="${o.id}">Orden #${o.numero} — ${o.vehiculo_patente||''} (${o.estado||''})</option>`).join('');
  });
}

async function guardarCaja(tipo){
  const concepto = document.getElementById('fc-concepto').value.trim();
  const monto = Number(document.getElementById('fc-monto').value)||0;
  const forma_pago = document.getElementById('fc-pago').value;
  const categoria = document.getElementById('fc-cat').value.trim();
  const fecha = document.getElementById('fc-fecha').value;
  const cliId = document.getElementById('fc-cli')?.value||'';
  const ordenId = document.getElementById('fc-orden')?.value||'';
  if(!concepto||!monto){alert('Completá concepto y monto');return;}
  await supa.from('caja').insert({tipo,concepto,monto,forma_pago,categoria,fecha});
  // Si hay cliente asociado, crear movimiento en cuenta corriente
  if(cliId){
    const tipoCta = tipo==='ingreso' ? 'credito' : 'debito';
    const marker = ordenId ? `[ORD:${ordenId}] ` : '';
    await supa.from('cuenta_corriente').insert({
      cliente_id:cliId, tipo:tipoCta, monto, fecha, saldo:0,
      concepto:`${marker}${concepto}`
    });
  }
  cerrarModal(); await renderCaja();
}

async function eliminarCaja(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  await supa.from('caja').delete().eq('id',id);
  await renderCaja();
}

async function modalArqueoCaja(fechaPreset){
  abrirModal(`
    <div class="modal-title">
      <span><i class="ti ti-lock"></i> Cierre de caja</span>
      <button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-weight:600">Fecha del cierre</label>
      <input type="date" id="arq-fecha" value="${fechaPreset||hoy()}" onchange="cargarDatosArqueo(this.value)" style="font-size:16px;padding:10px;width:100%">
    </div>
    <div id="arq-body"><div style="text-align:center;padding:20px;color:var(--text2)">Cargando...</div></div>`);
  await cargarDatosArqueo(fechaPreset||hoy());
}

async function cargarDatosArqueo(fechaStr){
  const {data} = await supa.from('caja').select('*').eq('fecha',fechaStr);
  const ingresos = (data||[]).filter(c=>c.tipo==='ingreso');
  const egresos  = (data||[]).filter(c=>c.tipo==='egreso');
  const totalIng = ingresos.reduce((a,b)=>a+Number(b.monto),0);
  const totalEgr = egresos.reduce((a,b)=>a+Number(b.monto),0);
  const balance  = totalIng - totalEgr;
  const ingEfectivo = ingresos.filter(c=>c.forma_pago==='efectivo').reduce((a,b)=>a+Number(b.monto),0);
  const egrEfectivo = egresos.filter(c=>c.forma_pago==='efectivo').reduce((a,b)=>a+Number(b.monto),0);
  const efectivoSistema = ingEfectivo - egrEfectivo;
  const formas = {};
  ingresos.forEach(m=>{ const k=m.forma_pago||'sin especificar'; formas[k]=(formas[k]||0)+Number(m.monto); });
  const filasFormas = Object.entries(formas).map(([k,v])=>
    `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="text-transform:capitalize">${k}</span>
      <span style="font-weight:600;color:var(--green)">${fmt(v)}</span>
    </div>`).join('') || '<p style="font-size:13px;color:var(--text2)">Sin ingresos ese día</p>';

  window._arqueoData = {hoyStr:fechaStr, totalIng, totalEgr, balance, efectivoSistema, formas};

  document.getElementById('arq-body').innerHTML = `
    <div class="grid3" style="margin-bottom:16px">
      <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-value green">${fmt(totalIng)}</div></div>
      <div class="metric"><div class="metric-label">Egresos</div><div class="metric-value red">${fmt(totalEgr)}</div></div>
      <div class="metric"><div class="metric-label">Balance sistema</div><div class="metric-value ${balance>=0?'green':'red'}">${fmt(balance)}</div></div>
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px">
      <div style="font-weight:600;margin-bottom:8px">Ingresos por forma de pago</div>
      ${filasFormas}
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px;background:var(--bg2)">
      <div style="font-weight:600;margin-bottom:4px">Efectivo esperado en caja</div>
      <div style="font-size:22px;font-weight:700;color:var(--text)">${fmt(efectivoSistema)}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">Ingresos efectivo menos egresos efectivo</div>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-weight:600">Efectivo contado físicamente *</label>
      <input type="number" id="arq-fisico" placeholder="0" oninput="
        const s=${efectivoSistema};
        const f=Number(this.value)||0;
        const d=f-s;
        document.getElementById('arq-dif').textContent=fmt(d);
        document.getElementById('arq-dif').style.color=d===0?'var(--text)':d>0?'var(--green)':'var(--red)';
        document.getElementById('arq-estado').textContent=d===0?'✓ Caja cuadrada':d>0?'Sobrante':'Faltante';
      " style="font-size:18px;font-weight:700;padding:12px">
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <span id="arq-estado" style="font-weight:600;color:var(--text2)">Ingresá el efectivo físico</span>
      <span id="arq-dif" style="font-size:20px;font-weight:700">—</span>
    </div>
    <div style="margin-bottom:16px">
      <label>Notas del cierre</label>
      <input id="arq-notas" placeholder="Observaciones opcionales...">
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCierreCaja()">
        <i class="ti ti-lock"></i> Confirmar cierre
      </button>
    </div>`;
}

async function confirmarCierreCaja(){
  const d = window._arqueoData;
  if(!d) return;
  const fisico = Number(document.getElementById('arq-fisico').value)||0;
  const notas  = document.getElementById('arq-notas').value.trim();
  const diferencia = fisico - d.efectivoSistema;

  const {error} = await supa.from('cierres_caja').insert({
    tipo: 'diario',
    fecha: d.hoyStr,
    mes: d.hoyStr.slice(0,7),
    total_ingresos: d.totalIng,
    total_egresos: d.totalEgr,
    balance_sistema: d.balance,
    efectivo_sistema: d.efectivoSistema,
    efectivo_fisico: fisico,
    diferencia,
    detalle_formas: JSON.stringify(d.formas),
    notas: notas||null
  });

  if(error){ alert('Error al guardar el cierre: ' + error.message); return; }
  cerrarModal();
  alert('✓ Cierre de caja registrado correctamente.');
}

async function modalCierreMensual(mesPreset){
  const mesDefault = mesPreset || hoy().slice(0,7);
  abrirModal(`
    <div class="modal-title">
      <span><i class="ti ti-calendar-month"></i> Cierre mensual</span>
      <button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-weight:600">Mes a cerrar</label>
      <input type="month" id="arqm-mes" value="${mesDefault}" onchange="cargarDatosArqueoMensual(this.value)" style="font-size:16px;padding:10px;width:100%">
    </div>
    <div id="arqm-body"><div style="text-align:center;padding:20px;color:var(--text2)">Cargando...</div></div>`);
  await cargarDatosArqueoMensual(mesDefault);
}

async function cargarDatosArqueoMensual(mes){
  const {data} = await supa.from('caja').select('*').gte('fecha', mes+'-01').lte('fecha', mes+'-31').order('fecha');
  const ingresos = (data||[]).filter(c=>c.tipo==='ingreso');
  const egresos  = (data||[]).filter(c=>c.tipo==='egreso');
  const totalIng = ingresos.reduce((a,b)=>a+Number(b.monto),0);
  const totalEgr = egresos.reduce((a,b)=>a+Number(b.monto),0);
  const balance  = totalIng - totalEgr;
  const ingEfectivo = ingresos.filter(c=>c.forma_pago==='efectivo').reduce((a,b)=>a+Number(b.monto),0);
  const egrEfectivo = egresos.filter(c=>c.forma_pago==='efectivo').reduce((a,b)=>a+Number(b.monto),0);
  const efectivoSistema = ingEfectivo - egrEfectivo;
  const formas = {};
  ingresos.forEach(m=>{ const k=m.forma_pago||'sin especificar'; formas[k]=(formas[k]||0)+Number(m.monto); });
  const filasFormas = Object.entries(formas).map(([k,v])=>
    `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="text-transform:capitalize">${k}</span>
      <span style="font-weight:600;color:var(--green)">${fmt(v)}</span>
    </div>`).join('') || '<p style="font-size:13px;color:var(--text2)">Sin ingresos este mes</p>';

  const nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const [y,mo] = mes.split('-');
  const nombreMesStr = `${nombres[parseInt(mo)-1]} ${y}`;
  window._arqueoMensualData = {mes, nombreMesStr, totalIng, totalEgr, balance, efectivoSistema, formas};

  document.getElementById('arqm-body').innerHTML = `
    <div class="grid3" style="margin-bottom:16px">
      <div class="metric"><div class="metric-label">Total ingresos</div><div class="metric-value green">${fmt(totalIng)}</div></div>
      <div class="metric"><div class="metric-label">Total egresos</div><div class="metric-value red">${fmt(totalEgr)}</div></div>
      <div class="metric"><div class="metric-label">Balance sistema</div><div class="metric-value ${balance>=0?'green':'red'}">${fmt(balance)}</div></div>
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px">
      <div style="font-weight:600;margin-bottom:8px">Ingresos por forma de pago</div>
      ${filasFormas}
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px;background:var(--bg2)">
      <div style="font-weight:600;margin-bottom:4px">Efectivo esperado acumulado</div>
      <div style="font-size:22px;font-weight:700;color:var(--text)">${fmt(efectivoSistema)}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">Ingresos efectivo menos egresos efectivo del mes</div>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-weight:600">Efectivo contado físicamente *</label>
      <input type="number" id="arqm-fisico" placeholder="0" oninput="
        const s=${efectivoSistema};
        const f=Number(this.value)||0;
        const d=f-s;
        document.getElementById('arqm-dif').textContent=fmt(d);
        document.getElementById('arqm-dif').style.color=d===0?'var(--text)':d>0?'var(--green)':'var(--red)';
        document.getElementById('arqm-estado').textContent=d===0?'✓ Cierre cuadrado':d>0?'Sobrante':'Faltante';
      " style="font-size:18px;font-weight:700;padding:12px">
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <span id="arqm-estado" style="font-weight:600;color:var(--text2)">Ingresá el efectivo físico</span>
      <span id="arqm-dif" style="font-size:20px;font-weight:700">—</span>
    </div>
    <div style="margin-bottom:16px">
      <label>Notas del cierre</label>
      <input id="arqm-notas" placeholder="Observaciones del mes...">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCierreMensual()">
        <i class="ti ti-calendar-month"></i> Confirmar cierre mensual
      </button>
    </div>`;
}

async function eliminarCierreMensual(id){
  if(!confirm('¿Eliminar este cierre mensual? Esta acción no se puede deshacer.')) return;
  const {error} = await supa.from('cierres_caja').delete().eq('id',id);
  if(error){ alert('Error al eliminar: '+error.message); return; }
  await renderCierre();
}

async function confirmarCierreMensual(){
  const d = window._arqueoMensualData;
  if(!d) return;
  const fisico = Number(document.getElementById('arqm-fisico').value)||0;
  const notas  = document.getElementById('arqm-notas').value.trim();
  const diferencia = fisico - d.efectivoSistema;

  const {error} = await supa.from('cierres_caja').insert({
    tipo: 'mensual',
    mes: d.mes,
    fecha: hoy(),
    total_ingresos: d.totalIng,
    total_egresos: d.totalEgr,
    balance_sistema: d.balance,
    efectivo_sistema: d.efectivoSistema,
    efectivo_fisico: fisico,
    diferencia,
    detalle_formas: JSON.stringify(d.formas),
    notas: notas||null
  });

  if(error){ alert('Error al guardar: ' + error.message); return; }
  cerrarModal();
  alert('✓ Cierre mensual registrado correctamente.');
  await renderCierre();
}

async function renderCierre(){
  const {data} = await supa.from('caja').select('*').order('fecha').order('created_at');
  const meses = [...new Set(data?.map(c=>c.fecha?.slice(0,7))||[])].sort().reverse();
  const mesActualVal = hoy().slice(0,7);
  const mesSelec = meses.includes(mesActualVal) ? mesActualVal : (meses[0]||mesActualVal);

  const nombreMes = m => {
    const [y,mo] = m.split('-');
    const nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return `${nombres[parseInt(mo)-1]} ${y}`;
  };

  function renderMes(mes){
    const movs = data?.filter(c=>c.fecha?.slice(0,7)===mes)||[];
    const ingresos = movs.filter(c=>c.tipo==='ingreso');
    const egresos  = movs.filter(c=>c.tipo==='egreso');
    const ing = ingresos.reduce((a,b)=>a+Number(b.monto),0);
    const egr = egresos.reduce((a,b)=>a+Number(b.monto),0);

    // Agrupado por categoría
    const catIng = {};
    ingresos.forEach(m=>{ const k=m.categoria||'Sin categoría'; catIng[k]=(catIng[k]||0)+Number(m.monto); });
    const catEgr = {};
    egresos.forEach(m=>{ const k=m.categoria||'Sin categoría'; catEgr[k]=(catEgr[k]||0)+Number(m.monto); });

    // Agrupado por forma de pago
    const fPago = {};
    ingresos.forEach(m=>{ const k=m.forma_pago||'Sin especificar'; fPago[k]=(fPago[k]||0)+Number(m.monto); });

    const rowCat = (obj, cls) => Object.entries(obj).sort((a,b)=>b[1]-a[1])
      .map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${k}</span><span class="${cls}" style="font-weight:600">${fmt(v)}</span></div>`).join('');

    const rowMovs = (arr, cls) => arr.length
      ? arr.map(m=>`<tr><td>${fmtFecha(m.fecha)}</td><td>${m.concepto}</td><td>${m.categoria||'-'}</td><td>${m.forma_pago||'-'}</td><td class="${cls}" style="font-weight:600">${fmt(m.monto)}</td></tr>`).join('')
      : `<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:16px">Sin movimientos</td></tr>`;

    return `
      <div class="grid3" style="margin-bottom:20px">
        <div class="metric"><div class="metric-label">Total ingresos</div><div class="metric-value green">${fmt(ing)}</div></div>
        <div class="metric"><div class="metric-label">Total egresos</div><div class="metric-value red">${fmt(egr)}</div></div>
        <div class="metric"><div class="metric-label">Balance del mes</div><div class="metric-value ${ing-egr>=0?'green':'red'}">${fmt(ing-egr)}</div></div>
      </div>
      <div class="grid2" style="margin-bottom:20px">
        <div class="card">
          <div class="seccion-title">Ingresos por categoría</div>
          ${Object.keys(catIng).length ? rowCat(catIng,'green') : '<p style="color:var(--text2);font-size:13px">Sin ingresos</p>'}
        </div>
        <div class="card">
          <div class="seccion-title">Egresos por categoría</div>
          ${Object.keys(catEgr).length ? rowCat(catEgr,'red') : '<p style="color:var(--text2);font-size:13px">Sin egresos</p>'}
        </div>
      </div>
      ${Object.keys(fPago).length ? `
      <div class="card">
        <div class="seccion-title">Ingresos por forma de pago</div>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px">
          ${Object.entries(fPago).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="background:var(--bg2);border-radius:8px;padding:10px 16px;min-width:120px"><div style="font-size:12px;color:var(--text2);text-transform:capitalize">${k}</div><div style="font-weight:700;color:var(--green);font-size:15px">${fmt(v)}</div></div>`).join('')}
        </div>
      </div>` : ''}`;
  }

  const {data:cierres} = await supa.from('cierres_caja').select('*').order('fecha',{ascending:false}).limit(500);
  window._todosCierres = cierres||[];

  const filaCierreMensual = c => {
    const dif = Number(c.diferencia)||0;
    return `<tr>
      <td><strong>${nombreMes(c.mes||c.fecha?.slice(0,7))}</strong><br><span style="font-size:11px;color:var(--text2)">Registrado ${fmtFecha(c.fecha)}</span></td>
      <td class="green">${fmt(c.total_ingresos)}</td>
      <td class="red">${fmt(c.total_egresos)}</td>
      <td style="font-weight:600">${fmt(c.balance_sistema)}</td>
      <td>${fmt(c.efectivo_sistema)}</td>
      <td>${fmt(c.efectivo_fisico)}</td>
      <td style="font-weight:700;color:${dif===0?'var(--green)':dif>0?'var(--green)':'var(--red)'}">${dif===0?'✓ Cuadrado':dif>0?'+'+fmt(dif):'-'+fmt(Math.abs(dif))}</td>
      <td style="font-size:12px;color:var(--text2)">${c.notas||'-'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="eliminarCierreMensual('${c.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  };

  function renderHistorial(mes){
    const mensuales = (window._todosCierres||[]).filter(c=>c.tipo==='mensual' && (c.mes||c.fecha?.slice(0,7))===mes);
    const tabla = mensuales.length
      ? `<div class="table-wrap"><table><thead><tr><th>Período</th><th>Ingresos</th><th>Egresos</th><th>Balance</th><th>Ef. sistema</th><th>Ef. físico</th><th>Diferencia</th><th>Notas</th><th></th></tr></thead>
         <tbody>${mensuales.map(filaCierreMensual).join('')}</tbody></table></div>`
      : '<p style="padding:16px;color:var(--text2);font-size:13px">Sin cierres mensuales registrados para este mes</p>';
    return `
      <div class="card" style="padding:0;margin-top:28px">
        <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
          <i class="ti ti-calendar-month"></i> Cierres mensuales registrados — ${nombreMes(mes)}
        </div>
        ${tabla}
      </div>`;
  }

  window._renderHistorialCierre = renderHistorial;

  document.getElementById('content').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="seccion-title" style="margin:0">Mes:</div>
      <select id="sel-mes" onchange="
        const m=this.value;
        document.getElementById('cierre-contenido').innerHTML=window._renderMesCierre(m);
        document.getElementById('cierre-historial').innerHTML=window._renderHistorialCierre(m);
      " style="min-width:180px">
        ${meses.map(m=>`<option value="${m}" ${m===mesSelec?'selected':''}>${nombreMes(m)}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="imprimirCierre()" style="gap:6px"><i class="ti ti-printer"></i> Imprimir</button>
      <button class="btn" style="background:#111;color:#fff;font-weight:600" onclick="modalCierreMensual(document.getElementById('sel-mes').value)"><i class="ti ti-calendar-month"></i> Cerrar mes</button>
    </div>
  </div>
  <div id="cierre-contenido">${renderMes(mesSelec)}</div>
  <div id="cierre-historial">${renderHistorial(mesSelec)}</div>`;
  window._renderMesCierre = renderMes;
}

function imprimirCierre(){
  const sel = document.getElementById('sel-mes');
  const mes = sel?.options[sel.selectedIndex]?.text||'';
  const contenido = document.getElementById('cierre-contenido')?.innerHTML||'';
  const win = window.open('','_blank');
  win.document.write(`<html><head><title>Cierre ${mes}</title>
  <style>body{font-family:sans-serif;padding:24px;color:#111} table{width:100%;border-collapse:collapse;margin-bottom:16px} th,td{border:1px solid #ddd;padding:6px 10px;font-size:13px} th{background:#f5f5f5} .green{color:#16a34a} .red{color:#dc2626} .metric{display:inline-block;border:1px solid #ddd;padding:12px 20px;margin:0 8px 12px 0;border-radius:8px;min-width:140px} .metric-label{font-size:12px;color:#666} .metric-value{font-size:20px;font-weight:700} .seccion-title{font-weight:600;margin-bottom:8px} .grid3,.grid2{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}</style>
  </head><body><h2>Cierre mensual — ${mes}</h2>${contenido}</body></html>`);
  win.document.close(); win.print();
}

render();
actualizarBadgeTurnos();
setInterval(actualizarBadgeTurnos, 60000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
