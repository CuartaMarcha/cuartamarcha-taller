<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuarta Marcha - Taller Mecánico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--verde:#1D9E75;--verde-dark:#0F6E56;--rojo:#E24B4A;--azul:#378ADD;--amber:#BA7517;--bg:#f8f8f6;--bg2:#ffffff;--border:#e5e5e0;--text:#1a1a18;--text2:#6b6b67;--radius:10px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:600;color:var(--verde)}
.logo-sub{font-size:11px;color:var(--text2);margin-top:2px}
.nav{padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:all .15s;border-right:3px solid transparent}
.nav-item:hover{background:#f0f0ee;color:var(--text)}
.nav-item.active{background:#e8f5f0;color:var(--verde);font-weight:500;border-right-color:var(--verde)}
.nav-item i{font-size:17px}
.nav-bottom{padding:12px 16px;border-top:1px solid var(--border)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:600}
.content{padding:24px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;font-family:inherit}
.btn:hover{background:#f0f0ee}
.btn-primary{background:var(--verde);color:#fff;border-color:var(--verde)}
.btn-primary:hover{background:var(--verde-dark)}
.btn-danger{background:var(--rojo);color:#fff;border-color:var(--rojo)}
.btn-sm{padding:5px 10px;font-size:12px}
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:26px;font-weight:600}
.green{color:var(--verde)}.red{color:var(--rojo)}.blue{color:var(--azul)}.amber{color:var(--amber)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
input,select,textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100;overflow-y:auto}
.modal{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:24px;width:580px;max-width:96vw;margin-bottom:60px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;color:var(--text2);text-align:left;padding:8px;border-bottom:1px solid var(--border);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:#e1f5ee;color:#0F6E56}
.badge-amber{background:#faeeda;color:#854F0B}
.badge-blue{background:#e6f1fb;color:#185FA5}
.badge-red{background:#fcebeb;color:#A32D2D}
.badge-gray{background:#f0f0ee;color:#6b6b67}
.avatar{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#e1f5ee;color:#0F6E56;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap input{padding-left:34px}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px}
.sep{border:none;border-top:1px solid var(--border);margin:16px 0}
.empty{text-align:center;padding:48px;color:var(--text2)}
.empty i{font-size:40px;margin-bottom:10px;display:block}
.priority-bar{display:flex;gap:8px;margin-bottom:20px}
.priority-col{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.priority-col-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.orden-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.orden-card:hover{border-color:var(--verde)}
.orden-card-num{font-size:11px;color:var(--text2);margin-bottom:2px}
.orden-card-cliente{font-size:13px;font-weight:500}
.orden-card-trabajo{font-size:12px;color:var(--text2);margin-top:2px}
.seccion-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;max-width:96vw}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-title{font-size:22px;font-weight:700;color:var(--verde)}
.login-logo-sub{font-size:13px;color:var(--text2);margin-top:4px}
.login-error{background:#fcebeb;color:#A32D2D;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:40px;color:var(--verde)"><i class="ti ti-tool"></i></div>
      <div class="login-logo-title">Cuarta Marcha</div>
      <div class="login-logo-sub">Taller Mecánico — Sistema de gestión</div>
    </div>
    <div><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')entrar()"></div>
    <div><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()"></div>
    <div class="login-error" id="login-error">Email o contraseña incorrectos</div>
    <button class="btn btn-primary" style="width:100%;margin-top:20px;justify-content:center;padding:12px" onclick="entrar()"><i class="ti ti-login"></i> Ingresar</button>
  </div>
</div>

<div class="app" id="sistema" style="display:none">
<div class="sidebar">
  <div class="logo">
    <div class="logo-title"><i class="ti ti-tool"></i> Cuarta Marcha</div>
    <div class="logo-sub">Taller Mecánico</div>
  </div>
  <div class="nav">
    <button class="nav-item active" onclick="ir('dashboard',this)"><i class="ti ti-layout-dashboard"></i> Inicio</button>
    <button class="nav-item" onclick="ir('clientes',this)"><i class="ti ti-users"></i> Clientes</button>
    <button class="nav-item" onclick="ir('vehiculos',this)"><i class="ti ti-car"></i> Vehículos</button>
    <button class="nav-item" onclick="ir('ordenes',this)"><i class="ti ti-file-text"></i> Órdenes</button>
    <button class="nav-item" onclick="ir('prioridades',this)"><i class="ti ti-list-numbers"></i> Prioridades</button>
    <button class="nav-item" onclick="ir('turnos',this)"><i class="ti ti-calendar"></i> Turnos</button>
    <button class="nav-item" onclick="ir('presupuestos',this)"><i class="ti ti-calculator"></i> Presupuestos</button>
    <button class="nav-item" onclick="ir('precios',this)"><i class="ti ti-tags"></i> Lista de precios</button>
    <button class="nav-item" onclick="ir('historial',this)"><i class="ti ti-history"></i> Historial</button>     <button class="nav-item" onclick="ir('historial',this)"><i class="ti ti-history"></i> Historial</button>     <button class="nav-item" onclick="ir('historial',this)"><i class="ti ti-history"></i> Historial</button>     <button class="nav-item" onclick="ir('historial',this)"><i class="ti ti-history"></i> Historial</button>     <button class="nav-item" onclick="ir('historial',this)"><i class="ti ti-history"></i> Historial</button>     <button class="nav-item" onclick="ir('cuentas',this)"><i class="ti ti-credit-card"></i> Cuentas ctes.</button>
    <button class="nav-item" onclick="ir('caja',this)"><i class="ti ti-cash"></i> Caja</button>
    <button class="nav-item" onclick="ir('cierre',this)"><i class="ti ti-chart-bar"></i> Cierre mensual</button>
  </div>
  <div class="nav-bottom">
    <button class="btn btn-sm" style="width:100%;justify-content:center" onclick="salir()"><i class="ti ti-logout"></i> Cerrar sesión</button>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="page-title">Inicio</span>
    <span style="font-size:12px;color:var(--text2)" id="fecha-top"></span>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="cerrarModalOverlay(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const SUPA_URL = 'https://ejhyvfjwudeponhgawiz.supabase.co';
const SUPA_KEY = 'sb_publishable_X_fOJC-3BhJ2ymGFB_6asQ_9T73J3GM';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

async function entrar(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display='none';
  const {error} = await supa.auth.signInWithPassword({email, password:pass});
  if(error){ err.style.display='block'; return; }
  mostrarSistema();
}

async function salir(){
  await supa.auth.signOut();
  document.getElementById('sistema').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
}

async function mostrarSistema(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('sistema').style.display='flex';
  document.getElementById('fecha-top').textContent = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  render();
}

supa.auth.getSession().then(({data:{session}})=>{ if(session) mostrarSistema(); });

const titles = {dashboard:'Inicio',clientes:'Clientes',vehiculos:'Vehículos',ordenes:'Órdenes de trabajo',prioridades:'Cola de prioridades',turnos:'Turnos',presupuestos:'Presupuestos',precios:'Lista de precios',historial:'Historial de clientes',cuentas:'Cuentas corrientes',caja:'Caja',cierre:'Cierre mensual'};
let page = 'dashboard';

function ir(p, el){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('page-title').textContent = titles[p];
  page = p; render();
}

function abrirModal(html){ document.getElementById('modal-inner').innerHTML=html; document.getElementById('modal-overlay').style.display='flex'; }
function cerrarModal(){ document.getElementById('modal-overlay').style.display='none'; }
function cerrarModalOverlay(e){ if(e.target===document.getElementById('modal-overlay')) cerrarModal(); }
function fmt(n){ return '$'+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0}); }
function fmtFecha(d){ if(!d)return''; const[y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function hoy(){ return new Date().toISOString().slice(0,10); }
function mesActual(){ return hoy().slice(0,7); }
function iniciales(n){ return (n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function badgeEstado(e){
  const m={recibido:'badge-amber',en_proceso:'badge-blue',listo:'badge-green',entregado:'badge-gray',cancelado:'badge-red'};
  const l={recibido:'Recibido',en_proceso:'En proceso',listo:'Listo',entregado:'Entregado',cancelado:'Cancelado'};
  return `<span class="badge ${m[e]||'badge-gray'}">${l[e]||e}</span>`;
}
function badgePrioridad(p){
  const m={urgente:'badge-red',normal:'badge-blue',puede_esperar:'badge-gray'};
  const l={urgente:'🔴 Urgente',normal:'🔵 Normal',puede_esperar:'⚪ Puede esperar'};
  return `<span class="badge ${m[p]||'badge-gray'}">${l[p]||p}</span>`;
}

async function render(){
  const c = document.getElementById('content');
  c.innerHTML = '<div class="empty"><i class="ti ti-loader"></i></div>';
  if(page==='dashboard') await renderDashboard();
  if(page==='clientes') await renderClientes();
  if(page==='vehiculos') await renderVehiculos();
  if(page==='ordenes') await renderOrdenes();
  if(page==='prioridades') await renderPrioridades();
  if(page==='turnos') await renderTurnos();
  if(page==='presupuestos') await renderPresupuestos();
  if(page==='precios') await renderPrecios();   if(page==='historial') await renderHistorial();   if(page==='historial') await renderHistorial();
  if(page==='cuentas') await renderCuentas();
  if(page==='caja') await renderCaja();
  if(page==='cierre') await renderCierre();
}

async function renderDashboard(){
  const [clientes, ordenes, turnos, caja] = await Promise.all([
    supa.from('clientes').select('id'),
    supa.from('ordenes').select('*'),
    supa.from('turnos').select('*').eq('fecha', hoy()),
    supa.from('caja').select('*')
  ]);
  const mes = caja.data?.filter(c=>c.fecha?.slice(0,7)===mesActual());
  const ing = mes?.filter(c=>c.tipo==='ingreso').reduce((a,b)=>a+Number(b.monto),0)||0;
  const egr = mes?.filter(c=>c.tipo==='egreso').reduce((a,b)=>a+Number(b.monto),0)||0;
  const abiertas = ordenes.data?.filter(o=>o.estado!=='entregado'&&o.estado!=='cancelado').length||0;
  const turnosHoy = turnos.data||[];
  const ordenesRecientes = (ordenes.data||[]).slice(-5).reverse();
  document.getElementById('content').innerHTML = `
  <div class="grid4" style="margin-bottom:20px">
    <div class="metric"><div class="metric-label">Clientes</div><div class="metric-value blue">${clientes.data?.length||0}</div></div>
    <div class="metric"><div class="metric-label">Órdenes abiertas</div><div class="metric-value amber">${abiertas}</div></div>
    <div class="metric"><div class="metric-label">Turnos hoy</div><div class="metric-value blue">${turnosHoy.length}</div></div>
    <div class="metric"><div class="metric-label">Balance del mes</div><div class="metric-value ${ing-egr>=0?'green':'red'}">${fmt(ing-egr)}</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="seccion-title"><i class="ti ti-calendar"></i> Turnos de hoy</div>
      ${turnosHoy.length?turnosHoy.sort((a,b)=>a.hora.localeCompare(b.hora)).map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;min-width:48px">${t.hora?.slice(0,5)}</div>
          <div><div style="font-weight:500">${t.cliente_nombre||'Cliente'}</div><div style="font-size:11px;color:var(--text2)">${t.tipo_trabajo}</div></div>
          ${badgeEstado(t.estado)}
        </div>`).join(''):
        '<div class="empty" style="padding:24px"><i class="ti ti-calendar-off"></i><p>Sin turnos hoy</p></div>'}
    </div>
    <div class="card">
      <div class="seccion-title"><i class="ti ti-file-text"></i> Órdenes recientes</div>
      ${ordenesRecientes.length?ordenesRecientes.map(o=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:500">${o.cliente_nombre||'Cliente'}</div><div style="font-size:11px;color:var(--text2)">${fmtFecha(o.fecha_ingreso)}</div></div>
          <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:500">${fmt(o.total)}</span>${badgeEstado(o.estado)}</div>
        </div>`).join(''):
        '<div class="empty" style="padding:24px"><i class="ti ti-file-off"></i><p>Sin órdenes</p></div>'}
    </div>
  </div>`;
}

async function renderClientes(){
  const {data} = await supa.from('clientes').select('*').order('nombre');
  document.getElementById('content').innerHTML = `
  <div style="display:flex;gap:12px;margin-bottom:20px">
    <div class="search-wrap" style="flex:1"><i class="ti ti-search si"></i><input type="text" placeholder="Buscar cliente..." id="buscar-cliente" oninput="filtrarClientes()"></div>
    <button class="btn btn-primary" onclick="modalCliente()"><i class="ti ti-plus"></i> Nuevo cliente</button>
  </div>
  <div class="card" style="padding:0" id="tabla-clientes">${renderTablaClientes(data||[])}</div>`;
  window._clientes = data||[];
}

function renderTablaClientes(data){
  if(!data.length) return '<div class="empty"><i class="ti ti-users"></i><p>No hay clientes registrados</p></div>';
  return `<table><thead><tr><th></th><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Email</th><th></th></tr></thead><tbody>
  ${data.map(c=>`<tr>
    <td><div class="avatar">${iniciales(c.nombre+' '+c.apellido)}</div></td>
    <td><div style="font-weight:500">${c.nombre} ${c.apellido}</div></td>
    <td>${c.dni||'-'}</td><td>${c.telefono||'-'}</td><td>${c.email||'-'}</td>
    <td style="display:flex;gap:4px">
      <button class="btn btn-sm" onclick="modalCliente('${c.id}')"><i class="ti ti-edit"></i></button>
      <button class="btn btn-sm btn-danger" onclick="eliminarCliente('${c.id}')"><i class="ti ti-trash"></i></button>
    </td></tr>`).join('')}
  </tbody></table>`;
}

function filtrarClientes(){
  const q = document.getElementById('buscar-cliente').value.toLowerCase();
  const filtrado = (window._clientes||[]).filter(c=>(c.nombre+' '+c.apellido+c.dni+c.telefono).toLowerCase().includes(q));
  document.getElementById('tabla-clientes').innerHTML = renderTablaClientes(filtrado);
}

function modalCliente(id){
  const c = id ? (window._clientes||[]).find(x=>x.id===id) : {};
  abrirModal(`
    <div class="modal-title"><span>${id?'Editar cliente':'Nuevo cliente'}</span><button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div>
    <div class="grid2">
      <div><label>Nombre *</label><input id="f-nombre" value="${c?.nombre||''}"></div>
      <div><label>Apellido *</label><input id="f-apellido" value="${c?.apellido||''}"></div>
    </div>
    <div class="grid2">
      <div><label>DNI</label><input id="f-dni" value="${c?.dni||''}"></div>
      <div><label>Teléfono *</label><input id="f-tel" value="${c?.telefono||''}"></div>
    </div>
    <div class="grid2">
      <div><label>Email</label><input id="f-email" value="${c?.email||''}"></div>
      <div><label>Dirección</label><input id="f-dir" value="${c?.direccion||''}"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCliente('${id||''}')">Guardar</button>
    </div>`);
}

async function guardarCliente(id){
  const data={nombre:document.getElementById('f-nombre').value.trim(),apellido:document.getElementById('f-apellido').value.trim(),dni:document.getElementById('f-dni').value.trim(),telefono:document.getElementById('f-tel').value.trim(),email:document.getElementById('f-email').value.trim(),direccion:document.getElementById('f-dir').value.trim()};
  if(!data.nombre||!data.apellido||!data.telefono){alert('Completá nombre, apellido y teléfono');return;}
  if(id){await supa.from('clientes').update(data).eq('id',id);}
  else{await supa.from('clientes').insert(data);}
  cerrarModal(); await renderClientes();
}

async function eliminarCliente(id){
  if(!confirm('¿Eliminar este cliente?'))return;
  await supa.from('clientes').delete().eq('id',id);
  await renderClientes();
}

async function renderVehiculos(){
  const {data} = await supa.from('vehiculos').select('*, clientes(nombre,apellido)').order('marca');
  document.getElementById('content').innerHTML = `
  <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
    <button class="btn btn-primary" onclick="modalVehiculo()"><i class="ti ti-plus"></i> Nuevo vehículo</button>
  </div>
  <div class="card" style="padding:0">
  ${data?.length?`<table><thead><tr><th>Patente</th><th>Marca / Modelo</th><th>Año</th><th>Color</th><th>Cliente</th><th>KM</th><th></th></tr></thead><tbody>
  ${data.map(v=>`<tr><td><strong>${v.patente}</strong></td><td>${v.marca} ${v.modelo}</td><td>${v.anio||'-'}</td><td>${v.color||'-'}</td><td>${v.clientes?.nombre||''} ${v.clientes?.apellido||''}</td><td>${v.kilometraje||'-'}</td>
    <td style="display:flex;gap:4px">

  const sel = document.getElementById('f-veh');
  if(!sel)return;
  sel.innerHTML = filtrados.length
    ? filtrados.map(v=>`<option value="${v.id}" ${v.id===selId?'selected':''}>${v.patente} - ${v.marca} ${v.modelo}</option>`).join('')
    : '<option value="">Sin vehículos para este cliente</option>';
}

async function aplicarComisionATodos(){
  const porc = Number(document.getElementById('porc-mp').value)||0;
  if(!porc){alert('Ingresá un porcentaje primero');return;}
  if(!confirm(`¿Aplicar ${porc}% de recargo a TODOS los precios de tarjeta?`))return;
  const {data} = await supa.from('precios').select('id,precio_contado');
  for(const p of data||[]){
    const tarjeta = Math.round(p.precio_contado*(1+porc/100));
    await supa.from('precios').update({precio_tarjeta:tarjeta}).eq('id',p.id);
  }
  await renderPrecios();
}

function filtrarVehsPres(vehs){
  const cliId = document.getElementById('fp-cli').value;
  const filtrados = (vehs||[]).filter(v=>v.cliente_id===cliId);
  const sel = document.getElementById('fp-veh');
  sel.innerHTML = filtrados.length?filtrados.map(v=>`<option value="${v.id}">${v.patente} - ${v.marca} ${v.modelo}</option>`).join(''):'<option value="">Sin vehículos</option>';
}

function agregarItemPres(){
  const sel = document.getElementById('fp-item-sel');
  const opt = sel.options[sel.selectedIndex];
  if(!opt.value)return;
  const tipo = document.getElementById('fp-tipo').value;
  const precio = tipo==='tarjeta'?Number(opt.dataset.tarj):Number(opt.dataset.cont);
  window._presup_items.push({desc:opt.text,precio,cantidad:1});
  renderItemsPres();
}

function renderItemsPres(){
  const lista = document.getElementById('fp-items-lista');
  if(!lista)return;
  lista.innerHTML = window._presup_items.map((it,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;font-size:13px">${it.desc}</div>
      <input type="number" value="${it.cantidad}" min="1" style="width:60px" onchange="window._presup_items[${i}].cantidad=Number(this.value);renderItemsPres()">
      <div style="min-width:90px;text-align:right">${fmt(it.precio*it.cantidad)}</div>
      <button class="btn btn-sm btn-danger" onclick="window._presup_items.splice(${i},1);renderItemsPres()"><i class="ti ti-trash"></i></button>
    </div>`).join('');
  const total = window._presup_items.reduce((a,b)=>a+b.precio*b.cantidad,0);
  const t = document.getElementById('fp-total');
  if(t) t.textContent = fmt(total);
}

async function guardarPresupuesto(){
  const cliSel = document.getElementById('fp-cli');
  const cliId = cliSel.value;
  const cliNombre = cliSel.options[cliSel.selectedIndex]?.dataset?.nombre||'';
  if(!cliId){alert('Seleccioná un cliente');return;}
  const total = window._presup_items.reduce((a,b)=>a+b.precio*b.cantidad,0);
  const {data:pres} = await supa.from('presupuestos').insert({cliente_id:cliId,cliente_nombre:cliNombre,vehiculo_id:document.getElementById('fp-veh').value||null,tipo_precio:document.getElementById('fp-tipo').value,observaciones:document.getElementById('fp-obs').value,total,estado:'pendiente',fecha:hoy()}).select().single();
  if(pres&&window._presup_items.length){
    await supa.from('presupuesto_items').insert(window._presup_items.map(it=>({presupuesto_id:pres.id,descripcion:it.desc,cantidad:it.cantidad,precio_unitario:it.precio,subtotal:it.precio*it.cantidad})));
  }
  cerrarModal(); await renderPresupuestos();
}

async function eliminarPresupuesto(id){
  if(!confirm('¿Eliminar?'))return;
  await supa.from('presupuestos').delete().eq('id',id);
  await renderPresupuestos();
}

async function guardarMovimiento(){
  const data={cliente_id:document.getElementById('fm-cli').value,tipo:document.getElementById('fm-tipo').value,monto:Number(document.getElementById('fm-monto').value)||0,concepto:document.getElementById('fm-concepto').value.trim(),fecha:document.getElementById('fm-fecha').value,saldo:0};

  ${data?.length?`<table><thead><tr><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Categoría</th><th>Forma de pago</th><th>Monto</th><th></th></tr></thead><tbody>
  ${data.map(c=>`<tr><td>${fmtFecha(c.fecha)}</td><td>${c.tipo==='ingreso'?'<span class="badge badge-green">Ingreso</span>':'<span class="badge badge-red">Egreso</span>'}</td><td>${c.concepto}</td><td>${c.categoria||'-'}</td><td>${c.forma_pago||'-'}</td><td class="${c.tipo==='ingreso'?'green':'red'}"><strong>${fmt(c.monto)}</strong></td>
    <td><button class="btn btn-sm btn-danger" onclick="eliminarCaja('${c.id}')"><i class="ti ti-trash"></i></button></td></tr>`).join('')}</tbody></table>`:'<div class="empty"><i class="ti ti-cash"></i><p>Sin movimientos</p></div>'}
  </div>`;
}

function modalCaja(tipo){
  abrirModal(`
    <div class="modal-title"><span>${tipo==='ingreso'?'Registrar ingreso':'Registrar egreso'}</span><button class="btn btn-sm" onclick="cerrarModal()"><i class="ti ti-x"></i></button></div>
    <div><label>Concepto *</label><input id="fc-concepto" placeholder="${tipo==='ingreso'?'Ej: Cobro orden #12':'Ej: Compra de insumos'}"></div>
    <div class="grid2">
      <div><label>Monto *</label><input type="number" id="fc-monto" placeholder="0"></div>
      <div><label>Forma de pago</label><select id="fc-pago">
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia</option>
        <option value="tarjeta_debito">Tarjeta débito</option>
        <option value="tarjeta_credito">Tarjeta crédito</option>
        <option value="cheque">Cheque</option>
      </select></div>
    </div>
    <div class="grid2">
      <div><label>Categoría</label><input id="fc-cat" placeholder="${tipo==='ingreso'?'Ej: Servicio':'Ej: Insumos'}"></div>
      <div><label>Fecha</label><input type="date" id="fc-fecha" value="${hoy()}"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn ${tipo==='ingreso'?'btn-primary':'btn-danger'}" onclick="guardarCaja('${tipo}')">Guardar</button>
    </div>`);
}

async function guardarCaja(tipo){
  const data={tipo,concepto:document.getElementById('fc-concepto').value.trim(),monto:Number(document.getElementById('fc-monto').value)||0,forma_pago:document.getElementById('fc-pago').value,categoria:document.getElementById('fc-cat').value.trim(),fecha:document.getElementById('fc-fecha').value};
  if(!data.concepto||!data.monto){alert('Completá concepto y monto');return;}
  await supa.from('caja').insert(data);
  cerrarModal(); await renderCaja();
}

async function eliminarCaja(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  await supa.from('caja').delete().eq('id',id);
  await renderCaja();
}

async function renderCierre(){
  const {data} = await supa.from('caja').select('*').order('fecha');
  const meses = [...new Set(data?.map(c=>c.fecha?.slice(0,7))||[])].sort().reverse();
  const mesSelec = meses[0]||mesActual();
  function renderMes(mes){
    const movs = data?.filter(c=>c.fecha?.slice(0,7)===mes)||[];
    const ing = movs.filter(c=>c.tipo==='ingreso').reduce((a,b)=>a+Number(b.monto),0);
    const egr = movs.filter(c=>c.tipo==='egreso').reduce((a,b)=>a+Number(b.monto),0);
    return `
      <div class="grid3" style="margin-bottom:20px">
        <div class="metric"><div class="metric-label">Total ingresos</div><div class="metric-value green">${fmt(ing)}</div></div>
        <div class="metric"><div class="metric-label">Total egresos</div><div class="metric-value red">${fmt(egr)}</div></div>
        <div class="metric"><div class="metric-label">Balance</div><div class="metric-value ${ing-egr>=0?'green':'red'}">${fmt(ing-egr)}</div></div>
      </div>
      <div class="grid2">
        <div class="card"><div class="seccion-title">Ingresos</div>
          ${movs.filter(c=>c.tipo==='ingreso').map(m=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${m.concepto}</span><span class="green">${fmt(m.monto)}</span></div>`).join('')||'<p style="color:var(--text2);font-size:13px">Sin ingresos</p>'}
        </div>
        <div class="card"><div class="seccion-title">Egresos</div>
          ${movs.filter(c=>c.tipo==='egreso').map(m=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${m.concepto}</span><span class="red">${fmt(m.monto)}</span></div>`).join('')||'<p style="color:var(--text2);font-size:13px">Sin egresos</p>'}
        </div>
      </div>`;
  }
  document.getElementById('content').innerHTML = `
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <div class="seccion-title" style="margin:0">Mes:</div>
    <select id="sel-mes" onchange="document.getElementById('cierre-contenido').innerHTML=renderMesActual(this.value)" style="width:200px">
      ${meses.map(m=>`<option value="${m}">${m}</option>`).join('')}
    </select>
  </div>
  <div id="cierre-contenido">${renderMes(mesSelec)}</div>`;
  window.renderMesActual = renderMes;
}

render();
</script>
</body>
</html>
